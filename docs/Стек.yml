id: 64
text: Технологический стек проекта DocsWalker.
sections:
  - "(#65) Версия .NET":
    - rules:
      - "(#87) Целевой LTS": Все компоненты DocsWalker собираются на актуальной LTS-версии .NET. На момент старта проекта — .NET 10. Конкретная версия SDK фиксируется в общем global.json (на момент бутстрапа — 10.0.201). TargetFramework каждого проекта — net10.0.
      - "(#88) Единое обновление": Переход на новую LTS-версию выполняется единым обновлением для всех проектов решения.
  - "(#66) Нативная компиляция":
    - rules:
      - "(#89) AOT для CLI": CLI-хост (DocsWalker.Cli) публикуется через Native AOT (PublishAot=true в csproj).
      - "(#90) AOT для ядра": Библиотека ядра (DocsWalker.Core) помечается IsAotCompatible=true. Код, использующий рефлексию для сериализации/десериализации, не допускается. Для System.Text.Json используются source-генераторы (JsonSerializerContext).
      - "(#91) Тесты на CLR": Тестовый проект (DocsWalker.Tests) собирается и запускается на стандартном CLR (xUnit с Native AOT не совместим). Это не отменяет требований к AOT-совместимости кода в src/.
  - "(#67) YAML-парсер":
    - rules:
      - "(#92) SharpYaml": Парсинг и сериализация YAML — через библиотеку SharpYaml (NuGet, источник xoofx/SharpYaml).
      - "(#93) Event-stream API": Используется event-stream API SharpYaml (SharpYaml.Parser.CreateParser → IParser, события из SharpYaml.Events). Использование object-mapping API SharpYaml через рефлексию не допускается — несовместимо с Native AOT.
  - "(#68) Тесты":
    - rules:
      - "(#94) xUnit": xUnit. Запускается через dotnet test.
      - "(#95) Smoke-тесты": Smoke-тесты на минимальное подмножество YAML, поддерживаемое DocsWalker, обязательны и должны быть зелёными до любого продвижения по реализации. Подмножество — block-mapping, block-sequence, flow-sequence, flow-mapping, скаляры в стилях unquoted/single-quoted/double-quoted, integer, true/false, комментарии #.
