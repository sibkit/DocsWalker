id: 64
text: Технологический стек проекта DocsWalker.
sections:
  - "(#65) Версия .NET":
    - rules:
      - "(#87) Целевой LTS":
        - text: Все компоненты DocsWalker собираются на актуальной LTS-версии .NET. На момент старта проекта — .NET 10. Конкретная версия SDK фиксируется в общем global.json (на момент бутстрапа — 10.0.201). TargetFramework каждого проекта — net10.0.
        - examples: [259]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#88) Единое обновление":
        - text: Переход на новую LTS-версию выполняется единым обновлением для всех проектов решения.
        - examples: [260]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
    - examples:
      - "(#259) global.json":
        - text: global.json фиксирует SDK 10.0.201; TargetFramework=net10.0 во всех csproj.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#260) Bump":
        - text: Переход с .NET 10 на .NET 12 правит TargetFramework во всех csproj и global.json одним коммитом.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
  - "(#66) Нативная компиляция":
    - rules:
      - "(#89) AOT для executable":
        - text: Нативные executable публикуются через Native AOT с PublishAot=true в csproj.
        - examples: [261]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#90) AOT для ядра":
        - text: Библиотека ядра (DocsWalker.Core) помечается IsAotCompatible=true. Код, использующий рефлексию для сериализации/десериализации, не допускается. Для System.Text.Json используются source-генераторы (JsonSerializerContext).
        - examples: [262]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#91) Тесты на CLR":
        - text: Тестовый проект (DocsWalker.Tests) собирается и запускается на стандартном CLR (xUnit с Native AOT не совместим). Это не отменяет требований к AOT-совместимости кода в src/.
        - examples: [263]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
    - examples:
      - "(#261) PublishAot":
        - text: В проектах, публикуемых как native executable, включается PublishAot=true.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#262) source-gen":
        - text: Для System.Text.Json используется JsonSerializerContext; через рефлексию сериализация запрещена.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#263) Тесты на CLR":
        - text: DocsWalker.Tests запускается dotnet test, не через AOT-publish.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
  - "(#67) YAML-парсер":
    - rules:
      - "(#92) SharpYaml":
        - text: Парсинг и сериализация YAML — через библиотеку SharpYaml (NuGet, источник xoofx/SharpYaml).
        - examples: [264]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#93) Event-stream API":
        - text: Используется event-stream API SharpYaml (SharpYaml.Parser.CreateParser → IParser, события из SharpYaml.Events). Использование object-mapping API SharpYaml через рефлексию не допускается — несовместимо с Native AOT.
        - examples: [265]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
    - examples:
      - "(#264) PackageReference":
        - text: В csproj указан <PackageReference Include="SharpYaml" .../>.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#265) Парсер":
        - text: В коде — SharpYaml.Parser.CreateParser, события из SharpYaml.Events; Serializer.Deserialize<T> не вызывается.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
  - "(#68) Тесты":
    - rules:
      - "(#94) xUnit":
        - text: xUnit. Запускается через dotnet test.
        - examples: [266]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#95) Smoke-тесты":
        - text: Smoke-тесты на минимальное подмножество YAML, поддерживаемое DocsWalker, обязательны и должны быть зелёными до любого продвижения по реализации. Подмножество — block-mapping, block-sequence, flow-sequence, flow-mapping, скаляры в стилях unquoted/single-quoted/double-quoted, integer, true/false, комментарии
        - examples: [267]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
    - examples:
      - "(#266) Запуск xUnit":
        - text: dotnet test src/DocsWalker.Tests — стандартный xUnit-runner.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#267) YAML-фичи":
        - text: Тесты проверяют block-mapping, flow-sequence, скаляры в quoted/unquoted стилях, integer, true/false, комментарии.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
