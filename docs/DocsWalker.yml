id: 1
text: Утилита управления docs/. Единственная точка записи, гарантирует валидность и целостность графа узлов и связей.
sections:
  - "(#2) Назначение":
    - statements:
      - "(#123) Программа на C#": DocsWalker — программа на C#, единственное средство чтения и записи docs/ для LLM и инструментов проекта.
      - "(#124) Без прямого YAML": LLM не работает с YAML-файлами docs/ напрямую. Все операции — через API DocsWalker.
    - rules:
      - "(#125) Запись через API": Любая запись в docs/ выполняется через DocsWalker. Прямая правка YAML-файлов LLM-ом запрещена.
      - "(#126) Невалидное недостижимо": 'Невалидное состояние docs/ недостижимо: запись применяется только если результат проходит полный набор проверок.'
  - "(#3) Архитектура":
    - statements:
      - "(#127) Ядро на C#": 'Ядро DocsWalker — библиотека на C#: парсер YAML, валидатор, API чтения и записи, сериализатор YAML.'
      - "(#128) Транспорты поверх": Поверх ядра — транспорты, отдающие API наружу.
    - rules:
      - "(#129) CLI первым": Транспорт первой реализации — CLI с подкомандами.
      - "(#130) MCP вторым": MCP-сервер (stdio JSON-RPC) добавляется как второй транспорт после стабилизации API через CLI.
  - "(#4) Уровни схемы":
    - definitions:
      - "(#5) мета-схема": Описание формы schema-файла. Источник правды для валидатора schema-файла. Хранится в docs/.docswalker/meta-schema.yml (текущая версия — v4).
      - "(#6) схема": Описание типов узлов проекта и контрактов их out_refs. Источник правды для валидатора обычных документов docs/. Хранится в docs/Схема.yml. Сама валидируется по мета-схеме.
    - rules:
      - "(#131) Двухуровневая валидация": Иерархия валидации двухуровневая — мета-схема валидирует схему; схема валидирует все остальные документы docs/.
      - "(#132) Универсальный default": Мета-схема создаётся в проекте универсальной (значение по умолчанию). При первом запуске DocsWalker в проекте без docs/.docswalker/meta-schema.yml файл создаётся со стандартным содержимым.
      - "(#133) Проектная правка": Проект может править docs/.docswalker/meta-schema.yml — DocsWalker использует именно проектную версию.
      - "(#134) Только в служебной папке": Мета-схема не размещается вне docs/.docswalker/. Папка docs/.docswalker/ зарезервирована за служебными файлами DocsWalker.
  - "(#7) Модель данных":
    - definitions:
      - "(#8) узел": 'Атомарная единица в DocsWalker. Имеет ровно 5 полей: id (sequence-id, выдаёт ядро), type (имя типа из Схемы), title (1–2-словный path-сегмент), text (единица смысла, всегда одна строка), out_refs (исходящие связи как Map<имя, list<id>>).'
      - "(#9) связь (ref)": 'Направленная пара (имя_связи, id_цели), хранится в out_refs узла-источника. Имя связи — либо встроенное path, либо имя, объявленное в типе узла-источника как out_refs[name] в Схеме.'
      - "(#83) out_refs": 'Поле узла, содержащее все его исходящие связи. Map<имя, list<id>>. Связь path присутствует у каждого узла кроме root (cardinality=one). Прочие связи объявляются типом узла-источника.'
      - "(#84) in_refs": Вычисляемое представление «кто на меня ссылается». Получается обратным проходом по графу. В YAML-файлах не хранится, доступно через API.
      - "(#85) path": 'Встроенная связь ядра. У каждого узла кроме root — обязательная, cardinality=one. Цель — родитель в иерархии. В out_refs хранится явно как out_refs[path] = [parent_id]. Управляется ядром через структурные операции create_node / delete_node / move_node; через create_ref / delete_ref не правится.'
      - "(#86) root": Синглтон ядра DocsWalker с id=0. В Схеме как тип не объявляется. Не создаётся и не удаляется. Допустим в path_targets и target_types как зарезервированное имя.
      - "(#184) folder": Структурный тип. Узел физически = каталог в docs/. Title_source=dirname (имя каталога). Идентификация через docs/.docswalker/folders.yml — там записывается id, parent_id и title для каждого folder-узла. Документы внутри подкаталога имеют path-связь на соответствующий folder, а не на root.
      - "(#185) folders.yml": 'Служебный файл docs/.docswalker/folders.yml — primary-источник folder-узлов. Формат — плоский YAML-список из mapping-записей с полями id, path (id родителя), title. Отсутствие или пустой файл = проект без подкаталогов. FS-каталоги в docs/ производны: расхождение «есть запись, нет каталога» / «есть каталог, нет записи» диагностируется как структурированная ошибка graph-load (folder_dir_missing / folder_record_missing) и не чинится автоматически.'
    - rules:
      - "(#135) Связи объявлены в типе": 'Все связи кроме path объявлены в типе узла-источника как out_refs (с именем, target_types, cardinality, required). Создание связи нового имени требует правки Схемы — добавления out_ref в type_definition.'
      - "(#136) id из sequence": У каждого узла есть глобально уникальный целочисленный id, выдаваемый DocsWalker из sequence-счётчика, хранящегося в docs/.docswalker/sequence.txt.
      - "(#137) id не вручную": LLM не задаёт id вручную. id выдаётся DocsWalker.
      - "(#138) path производна": 'Связь path производна от структурной операции: создаётся при create_node, переписывается при move_node, удаляется при delete_node. В out_refs хранится явно как значение для имени path, без отдельного концепта ref_type.'
      - "(#139) text — одна строка": text узла всегда одна строка. Многострочные значения (включая литералы "|" и ">") в docs/ запрещены.
  - "(#14) Идентификация и адресация":
    - statements:
      - "(#140) id и title": Узел адресуется по id. Для пользователя DocsWalker отдаёт id и title отдельными полями. Смысловые узлы в YAML серилизуются как single_key_mapping вида "(#id) title".
      - "(#141) Путь — цепочка path": Путь узла — цепочка path-связей до root. Доступна через API как массив id и как человекочитаемая строка title-сегментов; в YAML путь явно не хранится.
    - rules:
      - "(#142) Ссылки по id": Все ссылки между узлами — по id, без хранения пути в YAML.
      - "(#143) Rename без правки ссылок": При rename узла id остаётся тем же; ссылки на узел не правятся.
  - "(#15) Sequence-счётчик id":
    - statements:
      - "(#144) Файл sequence.txt": Счётчик id хранится в файле docs/.docswalker/sequence.txt. Содержимое — одно целое десятичное число, текущее положение sequence. Никаких других полей и форматов в файле нет.
    - rules:
      - "(#145) Старт с 0": При первой инициализации DocsWalker создаёт sequence.txt со значением 0.
      - "(#146) Инкремент при создании": При создании узла DocsWalker увеличивает значение в sequence.txt на 1 и присваивает новое значение полю id создаваемого узла.
      - "(#147) Монотонность": При удалении узла id не возвращается обратно. Sequence монотонно растёт.
      - "(#148) Без ручной правки": Ручная правка sequence.txt запрещена.
  - "(#16) Контракт валидации":
    - rules:
      - "(#149) Полный набор проверок": 'Каждая операция записи применяется только если результирующее состояние docs/ проходит все проверки: meta_schema (Схема.yml соответствует мета-схеме); schema (изменяемый документ соответствует Схеме — соблюдены path_targets и out_refs контракты типов, cardinality каждой связи, required-связи заполнены, text_required соблюдается); refs (имя каждой связи в out_refs узла объявлено в типе источника или равно path; цель связи существует; тип цели входит в target_types связи; цикл по path невозможен); unique (id узла глобально уникален; title уникален среди siblings одного типа в одном path-родителе); sequence (значение sequence-счётчика покрывает максимальный id графа); style (см. ниже).'
      - "(#150) Валидация по графу": 'Валидатор работает по in-memory графу узлов: все проверки строятся вокруг 5 свойств Node (id, type, title, text, out_refs). Сырой YAML-текст файлов валидатор не разбирает — структурные нарушения YAML отлавливаются парсером SharpYaml на этапе загрузки, валидация структуры файла поверх парсера не дублируется.'
      - "(#151) Style-проверка": 'Style-проверка: title узла соответствует title_format его типа (для смысловых типов — формат "(#id) title"); никакая строка-значение узла (title, text, элементы out_refs) не содержит управляющих символов перевода строки и табуляции — все значения помещаются на одну YAML-строку.'
      - "(#152) Атомарность записи": 'Запись атомарна: либо применяется целиком, либо файлы остаются без изменений и операция возвращает ошибку с диагностикой.'
      - "(#153) Структурированные ошибки": 'Ошибки возвращаются структурированно: код ошибки, id узла или координаты места ошибки, человекочитаемое сообщение, опциональный hint — короткая подсказка LLM-агенту «как починить» (имя команды, рекомендуемый порядок вызовов). Поле hint появляется только когда у ошибки есть осмысленная подсказка.'
  - "(#17) Операции чтения":
    - definitions:
      - "(#18) list_documents": Список всех структурных узлов уровня документа в docs/. Возвращает массив элементов с полями id, type ∈ {folder, document}, title, path. Без параметров.
      - "(#19) get_meta_schema": Полное описание мета-схемы в форме, пригодной для LLM. Используется как «инструкция по форме schema-файла» перед правкой Схема.yml.
      - "(#20) get_schema": Полное описание схемы — типы узлов, их title_source, text_required, path_targets и out_refs контракты. Используется как «инструкция по типам docs/» перед правкой обычных документов.
      - "(#21) get_map": Карта всех узлов docs/ — оглавление в форме дерева path-связей. Возвращает структуру id, title, type для каждого узла, без text и out_refs. Аналог содержания книги.
      - "(#22) get_nodes": 'Полные узлы по списку id. Параметры — ids (один или несколько id через запятую). Для каждого узла возвращает 5 полей: id, type, title, text, out_refs (Map<имя, list<id>>, включая path).'
      - "(#23) get_by_path": 'Полное поддерево узла по человекочитаемому пути. Параметр — path (строка вида "Документ" или "Документ/Раздел/Подраздел", разделитель "/"). Если path указывает на документ — возвращает полное содержимое YAML-файла в структурированной форме. Иначе — поддерево узла со всеми вложенными узлами. Используется для глубокого анализа без множества вызовов get_nodes.'
      - "(#24) get_refs": 'Все связи узла в обе стороны. Параметры — id, name (опц., фильтр по имени связи). Возвращает массивы in[] и out[] в едином формате: out — {name, target_id, target_title, target_path}; in — {name, source_id, source_title, source_path} — для каждой входящей связи name взят с узла-источника.'
      - "(#25) get_in_refs": Только входящие связи на узел. Параметры — id, name (опц.). Эквивалент get_refs с direction=in.
      - "(#26) search": Полнотекстовый поиск по title и text узлов. Параметр — query. Возвращает список id найденных узлов с фрагментами совпадений.
      - "(#70) check_integrity": 'Полный прогон валидатора на текущем состоянии docs/ без записи. Без параметров. Возвращает структуру {ok: bool, errors: [{code, message, path?, node_id?, hint?}]}. Сама команда не падает на ошибках графа — exit code 0; нарушения целостности — данные ответа, не CLI-ошибка. Используется LLM-агентом как sanity check перед цепочкой правок и для аудита после ручной правки YAML или миграции.'
  - "(#27) Операции записи":
    - definitions:
      - "(#28) create_node": 'Создать новый узел. Параметры — type (имя типа из Схемы), title (1–2-словный path-сегмент), text (если у типа text_required=true), плюс значения всех required связей контракта типа (включая path для всех типов с непустым path_targets — кроме root). Возвращает id созданного узла.'
      - "(#29) update_node": Обновить title и/или text узла. Параметры — id, новый title (опц.), новый text (опц.). Не меняет ни одну связь — для правки связей нужен create_ref, delete_ref или move_node.
      - "(#30) delete_node": Удалить узел. Запрещено, если на него есть входящие связи (in_refs), кроме path-связей детей — они разрываются каскадно. Удаляет вместе с узлом все его исходящие связи. Параметр — id.
      - "(#72) move_node": 'Перенести узел к новому родителю — изменить значение out_refs[path]. Параметры — id (переносимый узел), new_path (id нового родителя; должен входить в path_targets типа переносимого узла). При переносе между документами SourceFile у переносимого узла и всех его потомков обновляется. Вход в собственное поддерево запрещён.'
      - "(#31) create_ref": Создать связь. Параметры — from_id, name (имя связи, объявленной в out_refs типа узла-источника), to_id (тип цели должен входить в target_types этой связи). Связь path этой операцией не меняется — для path используется move_node.
      - "(#32) delete_ref": Удалить связь. Параметры — from_id, name, to_id. Запрещено, если связь имеет required=true и это её единственная цель.
      - "(#34) transaction": Атомарная пачка операций записи. Параметр — список операций любых из перечисленных выше (create_node, update_node, delete_node, move_node, create_ref, delete_ref). Применяется целиком или не применяется. Используется для составных изменений — переименование с одновременной правкой связанных узлов, перенос узла в одной транзакции с правкой полей, массовая правка.
    - rules:
      - "(#154) path как параметр create": create_node принимает значение связи path как обязательный параметр для всех типов с непустым path_targets, кроме root. Прочие required-связи типа также обязательны и принимаются именованными параметрами.
      - "(#155) Расширение Схемы вручную": Введение нового имени связи (нового out_ref в типе) или нового типа узла делается прямой правкой docs/Схема.yml — отдельной API-команды нет. Изменение Схемы — отдельная транзакция, которую DocsWalker валидирует как обычный документ через мета-схему.
      - "(#156) path только структурно": Связь path управляется только структурными операциями create_node / delete_node / move_node. Через create_ref / delete_ref её менять нельзя.
      - "(#186) folder в R10": 'create_node для folder создаёт каталог в docs/ и добавляет запись в folders.yml в одной транзакции; delete_node для folder допустим только для пустого каталога. update_node (rename) и move_node для folder в текущей версии не поддержаны (код not_supported) — появятся отдельной операцией с каскадным переписыванием путей у потомков.'
  - "(#35) CLI-интерфейс":
    - examples:
      - "(#36) Чтение нескольких узлов сразу": docswalker get-nodes --ids=1,8,42
      - "(#37) Карта документации": docswalker get-map
      - "(#38) Поддерево по пути": docswalker get-by-path --path="DocsWalker/Операции чтения"
      - "(#39) Все связи узла": docswalker get-refs --id=42
      - "(#40) Входящие связи на узел": docswalker get-in-refs --id=42
      - "(#41) Создание section": docswalker create-node --type=section --path=1 --title="Биекция текст ↔ граф"
      - "(#43) Создание именованной связи": docswalker create-ref --from-id=42 --name=related --to-id=8
      - "(#71) Проверка целостности docs/ без записи": docswalker check-integrity
      - "(#73) Перенос узла к новому родителю": docswalker move-node --id=42 --new-path=8
    - statements:
      - "(#157) Команды повторяют API": 'CLI-команды повторяют API один-в-один: имя команды — имя операции, аргументы — именованные ключи.'
    - rules:
      - "(#158) kebab-case команды": Имена команд — kebab-case (преобразование snake_case → kebab).
      - "(#159) --key=value": 'Аргументы — в форме --key=value; имена ключей — kebab-case (например, --from-id, --new-path). Для create-node имена параметров required-связей берутся из контракта типа в Схеме (--path для встроенной связи path; --<имя_связи> для каждой required out_ref). Списочные параметры принимаются через запятую.'
      - "(#160) --root общий": Общий параметр --root=<path> задаёт корень проекта (каталог, где лежит docs/). По умолчанию DocsWalker ищет ближайший docs/ вверх по дереву от текущей директории. Если каталог docs/ не найден — возвращается структурированная ошибка с кодом docs_not_found.
      - "(#161) Успех в stdout": 'Возврат успеха — JSON в stdout формы {"ok": true, "result": <значение>}, exit code 0. Поле result — структура, специфичная для команды: для одиночных write-команд — объект с полями результата операции; для read-команд — массив или объект с данными ответа.'
      - "(#162) transaction-result": 'Команда transaction возвращает result в форме массива объектов {"op": <имя_операции>, ...поля результата операции} в порядке исходных операций. Поле op отличает шейп от одиночной команды и позволяет потребителю сопоставить элемент массива с входной операцией.'
      - "(#163) UTF-8 без BOM": Кодировка stdout/stderr — UTF-8 без BOM. Кириллица и другие не-ASCII символы передаются как есть, без unicode-escape (без последовательностей вида backslash-u), чтобы экономить токены LLM-потребителя.
      - "(#164) Ошибка в stderr": 'Возврат ошибки — JSON в stderr формы {"ok": false, "error": {"code": <код>, "path": <путь, если применимо>, "message": <человекочитаемое сообщение>, "hint": <подсказка LLM, опционально>}}, exit code ненулевой. Поле hint появляется только когда у ошибки есть осмысленная подсказка; в success-ответе поля hint нет.'
      - "(#165) Коды CLI-ошибок": На вход неизвестной команды CLI возвращает ошибку с кодом unknown_command, на отсутствующий обязательный параметр — missing_parameter, на лишний параметр — unknown_parameter, на нарушение формата значения — invalid_parameter.
  - "(#44) MCP-интерфейс":
    - statements:
      - "(#166) MCP поверх ядра": MCP-сервер реализуется поверх того же ядра, что и CLI. Каждая операция API становится MCP-tool с типизированными параметрами.
    - notes:
      - "(#167) Вторая очередь": Реализация второй очереди, после стабилизации API через CLI.
  - "(#45) Стек реализации":
    - rules:
      - "(#168) C# на LTS .NET": Язык реализации — C# на актуальной LTS-версии .NET (см. Стек/Версия .NET). Все исполняемые компоненты публикуются через Native AOT (см. Стек/Нативная компиляция).
      - "(#169) SharpYaml event-stream": 'YAML-парсинг — внешняя .NET-библиотека SharpYaml (xoofx/SharpYaml). Используется только низкоуровневый event-stream API (Parser / EventReader / YamlStream); reflection-based Serializer не применяется как несовместимый с Native AOT. Принимаемое подмножество YAML 1.2: блочные mapping и sequence, flow-стиль для всех конструкций ([a, b, c] и {k: v, ...}), скаляры без кавычек, в одинарных и двойных кавычках, целые числа, true/false, комментарии "#". Допустимая структура задаётся Схемой и проверяется валидатором отдельно от парсера.'
      - "(#170) Запрещённый YAML": 'Не поддерживается: многострочные литералы "|" и ">", якоря "&" и "*", теги "!", директивы "%". Отлов этих конструкций — на стороне парсера SharpYaml (он отвергает их при разборе файла). Валидатор по сырому YAML не проходит и эти конструкции не ищет: его проверки построены поверх in-memory графа узлов.'
      - "(#171) Свой emitter": Сериализация YAML — собственный emitter, поддерживающий стилевые правила docs/ и склейку id+title по формату "(#id) title". Внешняя YAML-библиотека для записи не используется.
      - "(#172) Единый парсер": Парсинг мета-схемы и схемы — единым YAML-парсером (SharpYaml на event-stream API), как и обычные docs/*.yml. Отдельная JSON-зависимость для мета-схемы не вводится.
      - "(#173) JSON только для CLI": 'JSON используется только для CLI-обмена: формат вывода всех команд в stdout, формат ввода transaction. Сериализация — System.Text.Json с source-генераторами (JsonSerializerContext) для AOT-совместимости.'
      - "(#174) Без новых зависимостей": Сторонние библиотеки не подключаются без явного решения.
  - "(#69) Многопроцессная запись":
    - statements:
      - "(#175) Параллельные процессы": Несколько процессов DocsWalker могут одновременно открыть один docs/ — например, CLI из IDE и MCP-сервер, или несколько LLM-агентов параллельно.
    - rules:
      - "(#176) In-process lock": В пределах одного процесса операции сериализуются in-process lock-объектом.
      - "(#177) Cross-process lock": Между процессами операции записи sequence.txt и YAML-файлов сериализуются через единый lock-файл docs/.docswalker/.lock — второй процесс блокируется до завершения операции первого.
    - notes:
      - "(#178) Cross-process lock в MVP": Cross-process lock не реализован в первом MVP. До его реализации параллельный запуск DocsWalker над одним docs/ может привести к коллизии id (два процесса резервируют одно значение sequence.txt), затиранию правок одного процесса другим и полу-применённым атомарным записям между процессами. Минимально безопасный паттерн на сейчас — последовательный вызов DocsWalker.
  - "(#78) Атомизация и формат YAML смысловых узлов":
    - statements:
      - "(#179) Bullet → узел": Каждый бывший bullet-блок (statements, rules, may_rules, notes, llm) в section разворачивается в отдельный смысловой узел со своим id, type и title. text узла — формулировка, бывшая bare-string элементом списка. Это позволяет LLM фильтровать docs/ по одному правилу, одному определению или одному примеру, не подтягивая всю section.
      - "(#180) Дихотомия типов": 'Дихотомия типов: структурные (root, folder, document) идентифицируются файловой системой; смысловые (section, definition, example, statement, rule, may_rule, note, llm_hint) — inline-ключом YAML.'
    - definitions:
      - "(#79) формат смыслового узла": 'Single_key_mapping вида "(#id) title": value. id и title склеиваются в ключ, value — содержимое узла. Форма value диктуется контрактом типа: если text_required=true и нет out_refs — value = строка с текстом; если есть out_refs — value = mapping с сериализованными исходящими связями.'
      - "(#80) title как path-сегмент": title — 1–2-словное сжатие text узла, не display-name. Используется в path-навигации /Document/Section/Atom-title. Если для атома не находится естественного title — атом не нужен в graph (это шум, должен слиться с соседом или быть удалён).
    - examples:
      - "(#81) section с атомами": 'section "(#42) Биекция" имеет value=mapping с блоками statements, rules, …; внутри каждого блока — список single_key_mapping вида "(#100) Изоморфизм": Структура docs/ изоморфна графу узлов.'
      - "(#82) leaf-атом": '"(#100) Изоморфизм": Структура docs/ изоморфна графу узлов. — узел типа statement, id=100, title="Изоморфизм", text="Структура docs/ изоморфна графу узлов."'
    - rules:
      - "(#181) Расширение существующего формата": 'Атомизация распространяет существующий формат definition/example на ex-bullets: до атомизации statements были голыми строками, после — single_key_mapping.'
      - "(#182) inline_key для смысловых": В Схеме каждый смысловой тип объявляет title_source=inline_key. Структурные типы используют filename или dirname.
      - "(#183) id из sequence для атома": id атома выдаётся sequence-счётчиком при создании, как для любого узла.
