description: Утилита управления docs/. Единственная точка записи, гарантирует валидность и целостность графа узлов и связей.
content:
  - Назначение:
    - statements:
      - DocsWalker — программа на C#, единственное средство чтения и записи docs/ для LLM и инструментов проекта.
      - LLM не работает с YAML-файлами docs/ напрямую. Все операции — через API DocsWalker.
    - rules:
      - Любая запись в docs/ выполняется через DocsWalker. Прямая правка YAML-файлов LLM-ом запрещена.
      - 'Невалидное состояние docs/ недостижимо: запись применяется только если результат проходит полный набор проверок.'
  - Архитектура:
    - statements:
      - 'Ядро DocsWalker — библиотека на C#: парсер YAML, валидатор, API чтения и записи, сериализатор YAML.'
      - Поверх ядра — транспорты, отдающие API наружу.
    - rules:
      - Транспорт первой реализации — CLI с подкомандами.
      - MCP-сервер (stdio JSON-RPC) добавляется как второй транспорт после стабилизации API через CLI.
  - Уровни схемы:
    - definitions:
      - мета-схема: Описание формы schema-файла. Источник правды для валидатора schema-файла. Хранится в docs/.docswalker/meta-schema.yml.
      - схема: Описание узлов, связей и форм значений документов проекта. Источник правды для валидатора обычных документов docs/. Хранится в docs/Схема.yml. Сама валидируется по мета-схеме.
    - rules:
      - 'Иерархия валидации двухуровневая: мета-схема валидирует схему; схема валидирует все остальные документы docs/.'
      - Мета-схема создаётся в проекте универсальной (значение по умолчанию). При первом запуске DocsWalker в проекте без docs/.docswalker/meta-schema.yml файл создаётся со стандартным содержимым.
      - Проект может править docs/.docswalker/meta-schema.yml — DocsWalker использует именно проектную версию.
      - Мета-схема не размещается вне docs/.docswalker/. Папка docs/.docswalker/ зарезервирована за служебными файлами DocsWalker.
  - Модель данных:
    - definitions:
      - узел: Атомарная единица информации в DocsWalker. Имеет уникальный id. Может содержать описание и блоки YAML, но дальше узла адресации нет.
      - связь: Направленная типизированная пара (источник, тип, цель). Источник и цель — id узлов. Тип — имя ref_type, объявленного в Схеме, либо имя default-блока в Схеме (для связей по умолчанию).
      - тип связи (ref_type): Объявление допустимого типа связи в Схеме. Имеет имя, направление и признак системности.
      - системный тип связи: ref_type с system=true. Создаётся и удаляется DocsWalker автоматически, в YAML явно не хранится. Текущий системный тип — path (узел → родитель).
      - прикладной тип связи: ref_type с system=false. Хранится в блоке out_refs узла-источника как "имя_типа: id_цели".
      - связь по умолчанию (default ref): Связь, порождаемая принадлежностью узла к блоку дочерних узлов в схеме (definitions, examples, fields, content). Отдельный ref_type для неё в Схеме не вводится; имя связи совпадает с именем блока. Направление — родитель → ребёнок. В YAML не хранится явно — порождается из вложенности.
    - rules:
      - Все типы прикладных связей объявлены в Схеме как ref_type. Создание прикладной связи нового типа требует предварительного добавления ref_type в Схему через add_ref_type.
      - У каждого узла есть глобально уникальный целочисленный id, выдаваемый DocsWalker из sequence-счётчика, хранящегося в docs/.docswalker/sequence.txt.
      - 'Связи path и связи по умолчанию являются производными от YAML-вложенности: создаются и удаляются автоматически вместе с узлом, в файлах не хранятся.'
      - 'Связи по умолчанию доступны через те же методы чтения связей, что и явные: get_refs, get_in_refs, и поле out_refs у get_nodes. У каждой связи в результате указан её origin — explicit (для прикладных), system (для path), default (для связей по умолчанию).'
      - LLM не задаёт id вручную. id выдаётся DocsWalker.
      - Прикладные типы связей не пересекаются по имени с системными типами и с именами default-блоков (definitions, examples, fields, content).
  - Идентификация и адресация:
    - statements:
      - 'Узел адресуется по id. Для пользователя DocsWalker отдаёт id и title отдельными полями. В YAML id и title склеиваются по title_format узла, например "(#42) Биекция текст ↔ граф".'
      - 'Путь узла — производная цепочка path-связей до root. Доступна через API как массив id и как человекочитаемый путь по title; в YAML путь явно не хранится.'
    - rules:
      - Все ссылки между узлами — по id, без хранения пути в YAML.
      - 'При rename узла id остаётся тем же; ссылки на узел не правятся.'
  - Sequence-счётчик id:
    - statements:
      - 'Счётчик id хранится в файле docs/.docswalker/sequence.txt. Содержимое — одно целое десятичное число, текущее положение sequence. Никаких других полей и форматов в файле нет.'
    - rules:
      - При первой инициализации DocsWalker создаёт sequence.txt со значением 0.
      - При создании узла DocsWalker увеличивает значение в sequence.txt на 1 и присваивает новое значение полю id создаваемого узла.
      - При удалении узла id не возвращается обратно. Sequence монотонно растёт.
      - Ручная правка sequence.txt запрещена.
  - Контракт валидации:
    - rules:
      - 'Каждая операция записи применяется только если результирующее состояние docs/ проходит все проверки: meta_schema (схема Схема.yml соответствует мета-схеме); schema (изменяемый документ соответствует схеме); refs (тип каждой явной связи объявлен в Схеме как ref_type, цель связи существует, цикл по path невозможен); unique (id узла глобально уникален, title section уникален в пределах document); style (snake_case структурных ключей, отсутствие пустых строк, формат склеенного ключа узла соответствует title_format его типа).'
      - 'Запись атомарна: либо применяется целиком, либо файлы остаются без изменений и операция возвращает ошибку с диагностикой.'
      - 'Ошибки возвращаются структурированно: код ошибки, id узла или координаты места ошибки, человекочитаемое сообщение.'
  - Операции чтения:
    - definitions:
      - list_documents: Список всех документов в docs/. Возвращает массив пар (id, title=имя файла без расширения). Без параметров.
      - get_meta_schema: Полное описание мета-схемы в форме, пригодной для LLM. Используется как «инструкция по типам schema-файла» перед правкой Схема.yml.
      - get_schema: Полное описание схемы (типы узлов, типы связей, формы значений). Используется как «инструкция по типам docs/» перед правкой обычных документов.
      - get_map: Карта всех узлов docs/ — оглавление в форме дерева path-связей. Возвращает структуру id, title, type для каждого узла, без описаний и блоков. Аналог содержания книги.
      - get_nodes: Полные узлы по списку id. Параметры — ids (один или несколько id через запятую). Для каждого узла возвращает id, title, type, описание, блоки и поле out_refs — список исходящих связей с типами и id целей. В out_refs включены и явные прикладные связи, и связи по умолчанию (с пометкой origin). Системная связь path возвращается отдельным полем parent_id.
      - get_by_path: Полное поддерево узла по человекочитаемому пути. Параметр — path (строка вида "Документ" или "Документ/Раздел/Подраздел", разделитель "/"). Если path указывает на документ — возвращает полное содержимое YAML-файла в структурированной форме. Иначе — поддерево узла со всеми вложенными узлами. Используется для глубокого анализа без множества вызовов get_nodes.
      - get_refs: Все связи узла в обе стороны. Параметры — id, type (опц., фильтр по имени связи), origin (опц., фильтр explicit/system/default). Возвращает массивы in (входящие) и out (исходящие); в каждом элементе — direction, type, origin, id противоположного узла, его title и path для удобства LLM.
      - get_in_refs: Только входящие связи на узел. Параметры — id, type (опц.), origin (опц.). Эквивалент get_refs с direction=in. Включает и явные ссылки, и связи по умолчанию (родитель → этот узел через имя default-блока).
      - search: Полнотекстовый поиск по описаниям и блокам узлов. Параметр — query. Возвращает список id найденных узлов с фрагментами совпадений.
  - Операции записи:
    - definitions:
      - create_node: Создать новый узел и автоматически связь path с родителем. Параметры — parent_id, type (имя типа узла из Схемы), title (или name для field), body (опциональное содержимое узла — описание и блоки в форме, согласованной со Схемой). Возвращает id созданного узла.
      - update_node: Обновить содержимое узла без смены id. Параметры — id, patch (карта изменений: новый title, изменения описания и блоков). Не позволяет менять родителя — перенос делается через transaction.
      - delete_node: Удалить узел. Запрещено, если на него есть входящие прикладные связи. Удаляет вместе с узлом все его исходящие явные связи и системную path. Параметр — id.
      - create_ref: Создать прикладную связь. Параметры — from_id, type (имя ref_type, system=false), to_id. Тип должен быть объявлен в Схеме.
      - delete_ref: Удалить прикладную связь. Параметры — from_id, type, to_id.
      - add_ref_type: Добавить новый прикладной тип связи в Схему. Параметры — name (идентификатор), direction (для прикладных допустимо только from_to), description. После успешного выполнения тип становится доступен для create_ref.
      - transaction: Атомарная пачка операций записи. Параметр — список операций любых из перечисленных выше. Применяется целиком или не применяется. Используется для составных изменений — переименование с одновременной правкой связанных узлов, перенос узла в другого родителя, массовая правка.
    - rules:
      - Системные ref_type (path) не создаются и не удаляются операциями create_ref / delete_ref. Они изменяются только как побочный эффект create_node / delete_node / transaction.
      - Связи по умолчанию (definitions, examples, fields, content) не создаются и не удаляются явно — они производные от вложенности и появляются автоматически при создании дочернего узла в соответствующем блоке.
      - Введение нового прикладного типа связи требует add_ref_type в Схему до первого вызова create_ref с этим именем.
      - 'add_ref_type запрещён при коллизии имени с системным типом или с именем default-блока (definitions, examples, fields, content).'
  - CLI-интерфейс:
    - statements:
      - 'CLI-команды повторяют API один-в-один: имя команды — имя операции, аргументы — именованные ключи.'
    - rules:
      - Имена команд — kebab-case (преобразование snake_case → kebab).
      - 'Аргументы — в форме --key=value; имена ключей — kebab-case (например, --parent-id, --from-id). Списочные параметры (например, ids у get_nodes) принимаются через запятую.'
      - 'Общий параметр --root=<path> задаёт корень проекта (каталог, где лежит docs/). По умолчанию DocsWalker ищет ближайший docs/ вверх по дереву от текущей директории. Если каталог docs/ не найден — возвращается структурированная ошибка с кодом docs_not_found.'
      - 'Возврат успеха — JSON в stdout формы {"ok": true, "result": <значение>}, exit code 0.'
      - 'Возврат ошибки — JSON в stderr формы {"ok": false, "error": {"code": <код>, "path": <путь, если применимо>, "message": <человекочитаемое сообщение>}}, exit code ненулевой.'
      - 'Все команды также принимают общий --root и общую форму ответа. На вход неизвестной команды CLI возвращает ошибку с кодом unknown_command, на отсутствующий обязательный параметр — missing_parameter, на лишний параметр — unknown_parameter, на нарушение формата значения — invalid_parameter.'
    - examples:
      - Чтение нескольких узлов сразу: 'docswalker get-nodes --ids=1,8,42'
      - Карта документации: 'docswalker get-map'
      - Поддерево по пути: 'docswalker get-by-path --path="DocsWalker/Операции чтения"'
      - Все связи узла: 'docswalker get-refs --id=42'
      - Входящие связи на узел: 'docswalker get-in-refs --id=42'
      - Создание узла-section: 'docswalker create-node --parent-id=1 --type=section --title="Биекция текст ↔ граф"'
      - Регистрация нового типа связи: 'docswalker add-ref-type --name=defines --direction=from_to --description="Источник определяет цель."'
      - Создание прикладной связи: 'docswalker create-ref --from-id=42 --type=ref --to-id=8'
  - MCP-интерфейс:
    - statements:
      - MCP-сервер реализуется поверх того же ядра, что и CLI. Каждая операция API становится MCP-tool с типизированными параметрами.
    - notes:
      - Реализация второй очереди, после стабилизации API через CLI.
  - Стек реализации:
    - rules:
      - Язык реализации — C# на актуальной LTS-версии .NET (см. Стек/Версия .NET). Все исполняемые компоненты публикуются через Native AOT (см. Стек/Нативная компиляция).
      - 'YAML-парсинг — внешняя .NET-библиотека SharpYaml (xoofx/SharpYaml). Используется только низкоуровневый event-stream API (Parser / EventReader / YamlStream); reflection-based Serializer не применяется как несовместимый с Native AOT. Принимаемое подмножество YAML 1.2: блочные mapping и sequence, flow-стиль для всех конструкций ([a, b, c] и {k: v, ...}), скаляры без кавычек, в одинарных и двойных кавычках, целые числа, true/false, комментарии "#". Допустимая структура задаётся Схемой и проверяется валидатором отдельно от парсера.'
      - 'Не поддерживается: многострочные литералы "|" и ">", якоря "&" и "*", теги "!", директивы "%". Их встреча в файле — ошибка валидатора (если SharpYaml их пропускает) либо парсера (если отвергает сам).'
      - Сериализация YAML — собственный emitter, поддерживающий стилевые правила docs/ и склейку id+title по title_format. Внешняя YAML-библиотека для записи не используется.
      - 'Парсинг мета-схемы и схемы — единым YAML-парсером (SharpYaml на event-stream API), как и обычные docs/*.yml. Отдельная JSON-зависимость для мета-схемы не вводится.'
      - 'JSON используется только для CLI-обмена: формат вывода всех команд в stdout, формат ввода transaction. Сериализация — System.Text.Json с source-генераторами (JsonSerializerContext) для AOT-совместимости.'
      - Сторонние библиотеки не подключаются без явного решения.
    - out_refs:
      - "Стек/DocsWalker"
      - "Правила оформления"
