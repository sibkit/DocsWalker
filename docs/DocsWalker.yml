id: 1
description: Утилита управления docs/. Единственная точка записи, гарантирует валидность и целостность графа узлов и связей.
content:
  - "(#2) Назначение":
    - statements:
      - DocsWalker — программа на C#, единственное средство чтения и записи docs/ для LLM и инструментов проекта.
      - LLM не работает с YAML-файлами docs/ напрямую. Все операции — через API DocsWalker.
    - rules:
      - Любая запись в docs/ выполняется через DocsWalker. Прямая правка YAML-файлов LLM-ом запрещена.
      - 'Невалидное состояние docs/ недостижимо: запись применяется только если результат проходит полный набор проверок.'
  - "(#3) Архитектура":
    - statements:
      - 'Ядро DocsWalker — библиотека на C#: парсер YAML, валидатор, API чтения и записи, сериализатор YAML.'
      - Поверх ядра — транспорты, отдающие API наружу.
    - rules:
      - Транспорт первой реализации — CLI с подкомандами.
      - MCP-сервер (stdio JSON-RPC) добавляется как второй транспорт после стабилизации API через CLI.
  - "(#4) Уровни схемы":
    - definitions:
      - "(#5) мета-схема": Описание формы schema-файла. Источник правды для валидатора schema-файла. Хранится в docs/.docswalker/meta-schema.yml.
      - "(#6) схема": Описание узлов, связей и форм значений документов проекта. Источник правды для валидатора обычных документов docs/. Хранится в docs/Схема.yml. Сама валидируется по мета-схеме.
    - rules:
      - 'Иерархия валидации двухуровневая: мета-схема валидирует схему; схема валидирует все остальные документы docs/.'
      - Мета-схема создаётся в проекте универсальной (значение по умолчанию). При первом запуске DocsWalker в проекте без docs/.docswalker/meta-schema.yml файл создаётся со стандартным содержимым.
      - Проект может править docs/.docswalker/meta-schema.yml — DocsWalker использует именно проектную версию.
      - Мета-схема не размещается вне docs/.docswalker/. Папка docs/.docswalker/ зарезервирована за служебными файлами DocsWalker.
  - "(#7) Модель данных":
    - definitions:
      - "(#8) узел": Атомарная единица информации в DocsWalker. Имеет уникальный id. Может содержать описание и блоки YAML, но дальше узла адресации нет.
      - "(#9) значение оси": Конкретный экземпляр оси у узла — направленная типизированная связь (источник, ось, цель). Источник и цель — id узлов. Имя оси — name из секции axes Схемы.
      - "(#10) ось (axis)": Объявленное в Схеме направленное именованное отношение между узлами. Имеет name, direction (child_to_parent / parent_to_child / from_to), kind, cardinality (one / many) и опциональный target_types. Все оси проекта объявлены в секции axes файла docs/Схема.yml.
      - "(#11) ось kind=system": Ось, значения которой создаются и удаляются ядром DocsWalker автоматически как побочный эффект структурных операций. В YAML явно не хранится. Текущая system-ось — path (узел → родитель).
      - "(#12) ось kind=explicit": Ось, значения которой пишутся в YAML в блоке out_refs узла-источника как single_key_mapping {имя_оси: id_цели}. Текущая explicit-ось — ref.
      - "(#13) ось kind=default": Ось, значения которой порождаются принадлежностью узла дочернему блоку родителя в Схеме (definitions, examples, fields, content). Имя оси совпадает с именем блока. В YAML не хранится явно — выводится ядром из вложенности.
      - "(#74) обязательные оси типа": Список осей, которые объявлены у типа узла как must_have_axes в Схеме. Значение каждой такой оси должно быть задано при создании узла; ядро проверяет наличие при валидации.
      - "(#75) дополнительные оси типа": Список осей, которые объявлены у типа узла как may_have_axes в Схеме. Их значения не обязательны, но если заданы — должны соответствовать контракту оси.
    - rules:
      - Все оси объявлены в секции axes Схемы. Создание значения explicit-оси нового имени требует предварительного добавления оси в Схему через add_axis.
      - У каждого узла есть глобально уникальный целочисленный id, выдаваемый DocsWalker из sequence-счётчика, хранящегося в docs/.docswalker/sequence.txt.
      - 'Значения осей kind=system и kind=default являются производными: создаются и удаляются автоматически вместе с узлом и его положением в графе, в YAML-файлах не хранятся.'
      - 'Значения всех осей доступны через единые методы чтения: get_refs, get_in_refs, и поле out_refs у get_nodes. У каждого значения в результате указан axis_kind (system / default / explicit) и axis_name.'
      - LLM не задаёт id вручную. id выдаётся DocsWalker.
      - Имена осей kind=explicit не пересекаются по имени с осями kind=system и kind=default.
  - "(#14) Идентификация и адресация":
    - statements:
      - Узел адресуется по id. Для пользователя DocsWalker отдаёт id и title отдельными полями. В YAML id и title склеиваются по title_format узла, например "(#42) Биекция текст ↔ граф".
      - Путь узла — производная цепочка значений оси path до root. Доступна через API как массив id и как человекочитаемый путь по title; в YAML путь явно не хранится.
    - rules:
      - Все значения осей между узлами — по id, без хранения пути в YAML.
      - При rename узла id остаётся тем же; ссылки на узел не правятся.
  - "(#15) Sequence-счётчик id":
    - statements:
      - Счётчик id хранится в файле docs/.docswalker/sequence.txt. Содержимое — одно целое десятичное число, текущее положение sequence. Никаких других полей и форматов в файле нет.
    - rules:
      - При первой инициализации DocsWalker создаёт sequence.txt со значением 0.
      - При создании узла DocsWalker увеличивает значение в sequence.txt на 1 и присваивает новое значение полю id создаваемого узла.
      - При удалении узла id не возвращается обратно. Sequence монотонно растёт.
      - Ручная правка sequence.txt запрещена.
  - "(#16) Контракт валидации":
    - rules:
      - 'Каждая операция записи применяется только если результирующее состояние docs/ проходит все проверки: meta_schema (схема Схема.yml соответствует мета-схеме); schema (изменяемый документ соответствует схеме); axes (для каждого узла все обязательные оси типа имеют значение; имя каждого значения объявлено в секции axes Схемы; цель значения существует; контракт оси соблюдён по target_types и cardinality; цикл по оси path невозможен — нарушения ловятся кодами axis_value_invalid, axis_target_missing, axis_unknown, axis_cardinality_violation, axis_cycle); unique (id узла глобально уникален, title section уникален в пределах document, id внутри одного default-блока уникален — нарушение ловится кодом duplicate_child_in_block); sequence (значение sequence-счётчика покрывает максимальный id графа — нарушение ловится кодом sequence_underflow); style (см. ниже).'
      - 'Валидатор работает по in-memory графу узлов: все проверки строятся вокруг свойств Node (id, title, type, fields, blocks, inline values, axis_values). Сырой YAML-текст файлов валидатор не разбирает — структурные нарушения YAML отлавливаются парсером SharpYaml на этапе загрузки, валидация структуры файла поверх парсера не дублируется.'
      - 'Style-проверка: title узла соответствует title_format его типа после склейки id и title; никакая строка-значение узла (title, описание, значения полей, элементы текстовых блоков, inline value у single_key_mapping) не содержит управляющих символов перевода строки и табуляции — все значения помещаются на одну YAML-строку.'
      - 'Запись атомарна: либо применяется целиком, либо файлы остаются без изменений и операция возвращает ошибку с диагностикой.'
      - 'Ошибки возвращаются структурированно: код ошибки, id узла или координаты места ошибки, человекочитаемое сообщение, опциональный hint — короткая подсказка LLM-агенту «как починить» (имя команды, рекомендуемый порядок вызовов). Поле hint появляется только когда у ошибки есть осмысленная подсказка.'
  - "(#17) Операции чтения":
    - definitions:
      - "(#19) get_meta_schema": Полное описание мета-схемы в форме, пригодной для LLM. Используется как «инструкция по типам schema-файла» перед правкой Схема.yml.
      - "(#20) get_schema": Полное описание схемы (типы узлов, оси, формы значений). Используется как «инструкция по типам и осям docs/» перед правкой обычных документов.
      - "(#21) get_map": Карта всех узлов docs/ — оглавление в форме дерева по оси path. Возвращает структуру id, title, type для каждого узла, без описаний и блоков. Аналог содержания книги. Корни — узлы, у которых path указывает на системный псевдо-узел root.
      - "(#22) get_nodes": Полные узлы по списку id. Параметры — ids (один или несколько id через запятую). Для каждого узла возвращает id, title, type, описание, блоки и поле axis_values — список значений всех осей с полями axis_name, axis_kind (system / default / explicit), direction, target_id. Значение оси path возвращается дополнительно отдельным полем parent_id для удобства.
      - "(#23) get_by_path": Полное поддерево узла по человекочитаемому пути. Параметр — path (строка вида "Документ" или "Папка/Документ/Раздел/Подраздел", разделитель "/"). Пустая строка path="" указывает на root. Если path указывает на документ — возвращает полное содержимое YAML-файла в структурированной форме. Иначе — поддерево узла со всеми вложенными узлами. Используется для глубокого анализа без множества вызовов get_nodes.
      - "(#24) get_refs": Все значения осей у узла в обе стороны. Параметры — id, axis (опц., фильтр по имени оси), axis_kind (опц., фильтр system/default/explicit). Возвращает массивы in (входящие) и out (исходящие); в каждом элементе — direction, axis_name, axis_kind, id противоположного узла, его title и path для удобства LLM.
      - "(#25) get_in_refs": Только входящие значения осей на узел. Параметры — id, axis (опц.), axis_kind (опц.). Эквивалент get_refs с direction=in. Включает значения всех осей, у которых этот узел — цель.
      - "(#26) search": Полнотекстовый поиск по описаниям и блокам узлов. Параметр — query. Возвращает список id найденных узлов с фрагментами совпадений.
      - "(#70) check_integrity": "Полный прогон валидатора на текущем состоянии docs/ без записи. Без параметров. Возвращает структуру {ok: bool, errors: [{code, message, path?, node_id?, hint?}]}. Сама команда не падает на ошибках графа — exit code 0; нарушения целостности — данные ответа, не CLI-ошибка. Используется LLM-агентом как sanity check перед цепочкой правок и для аудита после ручной правки YAML или миграции."
  - "(#27) Операции записи":
    - definitions:
      - "(#28) create_node": 'Создать новый узел. Параметры — type (имя типа узла из Схемы), title (или name для field), body (опциональное содержимое узла — описание и блоки в форме, согласованной со Схемой), плюс значения всех обязательных осей типа (must_have_axes из Схемы). Имена параметров значений осей берутся из Схемы по type — например, для типа section обязательна ось path → параметр path. Дополнительные оси (may_have_axes) могут передаваться там же. Допустимы значения id (целое) или путь по оси path (строка вида "Папка/Документ"). Пустая строка пути ("") указывает на системный псевдо-узел root. Возвращает id созданного узла.'
      - "(#29) update_node": 'Обновить содержимое узла без смены id. Параметры — id, patch (карта изменений: новый title, изменения описания и блоков). Не меняет значения осей — перенос по оси path делается через move_node, правка значений explicit-осей — через create_ref / delete_ref.'
      - "(#30) delete_node": Удалить узел. Запрещено, если на него есть входящие значения explicit-осей извне поддерева. Удаляет вместе с узлом все его значения explicit-осей. Значения system- и default-осей пересчитываются ядром автоматически. Параметр — id.
      - "(#72) move_node": 'Перенести узел — сменить значение оси path. Параметры — id (переносимый узел), path (новый узел-цель оси path; id или человекочитаемый путь), block (опц., имя default-блока у нового родителя; задаётся явно при многозначности). Правила: id переносимого узла не меняется; новый родитель должен иметь блок role=default_axis, принимающий тип переносимого узла; если у нового родителя несколько таких блоков — параметр block обязателен; при переносе между документами SourceFile у переносимого узла и всех его потомков обновляется на документ нового родителя. Вход в собственное поддерево запрещён.'
      - "(#31) create_ref": Создать значение explicit-оси. Параметры — from_id, axis (имя оси kind=explicit), to_id. Имя оси должно быть объявлено в Схеме.
      - "(#32) delete_ref": Удалить значение explicit-оси. Параметры — from_id, axis, to_id.
      - "(#33) add_axis": Добавить новую ось kind=explicit в Схему. Параметры — name (идентификатор), direction (для explicit допустимо только from_to), cardinality (one / many), target_types (опц., список имён типов), description. После успешного выполнения ось становится доступна для create_ref.
      - "(#34) transaction": 'Атомарная пачка операций записи. Параметр — список операций любых из перечисленных выше (create_node, update_node, delete_node, move_node, create_ref, delete_ref, add_axis). Применяется целиком или не применяется. Используется для составных изменений — переименование с одновременной правкой связанных узлов, перенос узла в другого родителя в одной транзакции с правкой полей, массовая правка.'
    - rules:
      - Значения осей kind=system (path) не создаются и не удаляются операциями create_ref / delete_ref. Они изменяются только как побочный эффект create_node / delete_node / move_node / transaction.
      - Значения осей kind=default (definitions, examples, fields, content) не создаются и не удаляются явно — они производные от принадлежности узла дочернему блоку родителя и появляются автоматически при создании ребёнка в соответствующем блоке.
      - Введение новой оси kind=explicit требует add_axis до первого вызова create_ref с этим именем.
      - add_axis запрещён при коллизии имени с осью kind=system или kind=default уже объявленной в Схеме.
  - "(#35) CLI-интерфейс":
    - examples:
      - "(#36) Чтение нескольких узлов сразу": docswalker get-nodes --ids=1,8,42
      - "(#37) Карта документации": docswalker get-map
      - "(#38) Поддерево по пути": docswalker get-by-path --path="DocsWalker/Операции чтения"
      - "(#39) Все значения осей у узла": docswalker get-refs --id=42
      - "(#40) Входящие значения осей на узел": docswalker get-in-refs --id=42
      - "(#41) Создание узла-section внутри документа": docswalker create-node --type=section --path="DocsWalker" --title="Биекция текст ↔ граф"
      - "(#76) Создание папки в корне docs/": docswalker create-node --type=folder --path="" --title="Архив"
      - "(#77) Создание документа в подпапке": docswalker create-node --type=document --path="Архив" --title="Отчёт" --description="Краткое описание."
      - "(#42) Регистрация новой explicit-оси": docswalker add-axis --name=defines --direction=from_to --cardinality=many --description="Источник определяет цель."
      - "(#43) Создание значения explicit-оси": docswalker create-ref --from-id=42 --axis=ref --to-id=8
      - "(#71) Проверка целостности docs/ без записи": docswalker check-integrity
      - "(#73) Перенос узла к новому родителю": docswalker move-node --id=42 --path=8 --block=definitions
    - statements:
      - 'CLI-команды повторяют API один-в-один: имя команды — имя операции, аргументы — именованные ключи.'
      - 'Параметры команды create-node частично динамические: помимо фиксированных --type, --title, --body, ожидается набор --<axis-name> для всех обязательных осей типа. Имена и набор берутся из Схемы по --type — см. описание типа через get-schema или describe-type.'
    - rules:
      - Имена команд — kebab-case (преобразование snake_case → kebab).
      - Аргументы — в форме --key=value; имена ключей — kebab-case (например, --from-id, --new-parent-id). Имена параметров значений осей совпадают с именем оси (--path, --next, --depends-on). Списочные параметры (например, ids у get_nodes) принимаются через запятую.
      - Общий параметр --root=<path> задаёт корень проекта (каталог, где лежит docs/). По умолчанию DocsWalker ищет ближайший docs/ вверх по дереву от текущей директории. Если каталог docs/ не найден — возвращается структурированная ошибка с кодом docs_not_found.
      - 'Возврат успеха — JSON в stdout формы {"ok": true, "result": <значение>}, exit code 0. Поле result — структура, специфичная для команды: для одиночных write-команд (create-node, update-node, delete-node, create-ref, delete-ref, add-axis) — объект с полями результата операции; для read-команд — массив или объект с данными ответа.'
      - 'Команда transaction возвращает result в форме массива объектов {"op": <имя_операции>, ...поля результата операции} в порядке исходных операций. Поле op отличает шейп от одиночной команды и позволяет потребителю сопоставить элемент массива с входной операцией.'
      - Кодировка stdout/stderr — UTF-8 без BOM. Кириллица и другие не-ASCII символы передаются как есть, без unicode-escape (без последовательностей вида backslash-u), чтобы экономить токены LLM-потребителя.
      - 'Возврат ошибки — JSON в stderr формы {"ok": false, "error": {"code": <код>, "path": <путь, если применимо>, "message": <человекочитаемое сообщение>, "hint": <подсказка LLM, опционально>}}, exit code ненулевой. Поле hint появляется только когда у ошибки есть осмысленная подсказка; в success-ответе поля hint нет.'
      - Все команды также принимают общий --root и общую форму ответа. На вход неизвестной команды CLI возвращает ошибку с кодом unknown_command, на отсутствующий обязательный параметр — missing_parameter, на лишний параметр — unknown_parameter, на нарушение формата значения — invalid_parameter.
  - "(#44) MCP-интерфейс":
    - statements:
      - MCP-сервер реализуется поверх того же ядра, что и CLI. Каждая операция API становится MCP-tool с типизированными параметрами.
    - notes:
      - Реализация второй очереди, после стабилизации API через CLI.
  - "(#45) Стек реализации":
    - rules:
      - Язык реализации — C# на актуальной LTS-версии .NET (см. Стек/Версия .NET). Все исполняемые компоненты публикуются через Native AOT (см. Стек/Нативная компиляция).
      - 'YAML-парсинг — внешняя .NET-библиотека SharpYaml (xoofx/SharpYaml). Используется только низкоуровневый event-stream API (Parser / EventReader / YamlStream); reflection-based Serializer не применяется как несовместимый с Native AOT. Принимаемое подмножество YAML 1.2: блочные mapping и sequence, flow-стиль для всех конструкций ([a, b, c] и {k: v, ...}), скаляры без кавычек, в одинарных и двойных кавычках, целые числа, true/false, комментарии "#". Допустимая структура задаётся Схемой и проверяется валидатором отдельно от парсера.'
      - 'Не поддерживается: многострочные литералы "|" и ">", якоря "&" и "*", теги "!", директивы "%". Отлов этих конструкций — на стороне парсера SharpYaml (он отвергает их при разборе файла). Валидатор по сырому YAML не проходит и эти конструкции не ищет: его проверки построены поверх in-memory графа узлов.'
      - Сериализация YAML — собственный emitter, поддерживающий стилевые правила docs/ и склейку id+title по title_format. Внешняя YAML-библиотека для записи не используется.
      - Парсинг мета-схемы и схемы — единым YAML-парсером (SharpYaml на event-stream API), как и обычные docs/*.yml. Отдельная JSON-зависимость для мета-схемы не вводится.
      - 'JSON используется только для CLI-обмена: формат вывода всех команд в stdout, формат ввода transaction. Сериализация — System.Text.Json с source-генераторами (JsonSerializerContext) для AOT-совместимости.'
      - Сторонние библиотеки не подключаются без явного решения.
    - out_refs:
      - ref: 64
      - ref: 46
  - "(#69) Многопроцессная запись":
    - statements:
      - Несколько процессов DocsWalker могут одновременно открыть один docs/ — например, CLI из IDE и MCP-сервер, или несколько LLM-агентов параллельно.
    - rules:
      - В пределах одного процесса операции сериализуются in-process lock-объектом.
      - Между процессами операции записи sequence.txt и YAML-файлов сериализуются через единый lock-файл docs/.docswalker/.lock — второй процесс блокируется до завершения операции первого.
    - notes:
      - Cross-process lock не реализован в первом MVP. До его реализации параллельный запуск DocsWalker над одним docs/ может привести к коллизии id (два процесса резервируют одно значение sequence.txt), затиранию правок одного процесса другим и полу-применённым атомарным записям между процессами. Минимально безопасный паттерн на сейчас — последовательный вызов DocsWalker.
