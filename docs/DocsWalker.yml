id: 1
text: Утилита управления docs/. Единственная точка записи, гарантирует валидность и целостность графа узлов и связей.
sections:
  - "(#2) Назначение":
    - statements:
      - "(#123) Программа на C#": DocsWalker — программа на C#, единственное средство чтения и записи docs/ для LLM и инструментов проекта.
      - "(#124) Без прямого YAML": LLM не работает с YAML-файлами docs/ напрямую. Все операции — через API DocsWalker.
    - rules:
      - "(#125) Запись через API":
        - text: Любая запись в docs/ выполняется через DocsWalker. Прямая правка YAML-файлов LLM-ом запрещена.
        - examples: [188]
      - "(#126) Невалидное недостижимо":
        - text: 'Невалидное состояние docs/ недостижимо: запись применяется только если результат проходит полный набор проверок.'
        - examples: [189]
    - examples:
      - "(#188) CLI": Создание section через `docswalker create-node --type=section --title=...`, не правкой YAML вручную.
      - "(#189) Откат": Попытка create-ref с несуществующим to_id отвергается; docs/ остаётся валидным.
  - "(#3) Архитектура":
    - statements:
      - "(#127) Ядро на C#": 'Ядро DocsWalker — библиотека на C#: парсер YAML, валидатор, API чтения и записи, сериализатор YAML.'
      - "(#128) Транспорты поверх": Поверх ядра — транспорты, отдающие API наружу.
    - rules:
      - "(#129) CLI первым":
        - text: Транспорт первой реализации — CLI с подкомандами.
        - examples: [190]
      - "(#130) MCP вторым":
        - text: MCP-сервер (stdio JSON-RPC) добавляется как второй транспорт после стабилизации API через CLI.
        - examples: [191]
    - examples:
      - "(#190) Подкоманды": 'Транспорт CLI: `docswalker get-nodes`, `docswalker create-node`, `docswalker move-node`.'
      - "(#191) MCP-tool": Каждая API-операция доступна как MCP-tool в сервере после стабилизации CLI.
  - "(#4) Уровни схемы":
    - rules:
      - "(#131) Двухуровневая валидация":
        - text: Иерархия валидации двухуровневая — мета-схема валидирует схему; схема валидирует все остальные документы docs/.
        - examples: [192]
      - "(#132) Универсальный default":
        - text: Мета-схема создаётся в проекте универсальной (значение по умолчанию). При первом запуске DocsWalker в проекте без docs/.docswalker/meta-schema.yml файл создаётся со стандартным содержимым.
        - examples: [193]
      - "(#133) Проектная правка":
        - text: Проект может править docs/.docswalker/meta-schema.yml — DocsWalker использует именно проектную версию.
        - examples: [194]
      - "(#134) Только в служебной папке":
        - text: Мета-схема не размещается вне docs/.docswalker/. Папка docs/.docswalker/ зарезервирована за служебными файлами DocsWalker.
        - examples: [195]
    - definitions:
      - "(#5) мета-схема": Описание формы schema-файла. Источник правды для валидатора schema-файла. Хранится в docs/.docswalker/meta-schema.yml (текущая версия — v4).
      - "(#6) схема": Описание типов узлов проекта и контрактов их out_refs. Источник правды для валидатора обычных документов docs/. Хранится в docs/Схема.yml. Сама валидируется по мета-схеме.
    - examples:
      - "(#192) Цепочка": meta-schema.yml валидирует Схема.yml, а Схема.yml валидирует все docs/*.yml.
      - "(#193) Auto-create": При первом запуске check-integrity без meta-schema.yml файл создаётся со стандартным содержимым.
      - "(#194) Кастомный type": Добавление нового type_definition в meta-schema.yml — DocsWalker использует именно проектную версию.
      - "(#195) Только в .docswalker": meta-schema.yml в docs/conf/meta-schema.yml не загружается; путь жёстко привязан к docs/.docswalker/.
  - "(#7) Модель данных":
    - rules:
      - "(#135) Связи объявлены в типе":
        - text: Все связи кроме path объявлены в типе узла-источника как out_refs (с именем, target_types, cardinality, required). Создание связи нового имени требует правки Схемы — добавления out_ref в type_definition.
        - examples: [196]
      - "(#136) id из sequence":
        - text: У каждого узла есть глобально уникальный целочисленный id, выдаваемый DocsWalker из sequence-счётчика, хранящегося в docs/.docswalker/sequence.txt.
        - examples: [197]
      - "(#137) id не вручную":
        - text: LLM не задаёт id вручную. id выдаётся DocsWalker.
        - examples: [198]
      - "(#138) path производна":
        - text: 'Связь path производна от структурной операции: создаётся при create_node, переписывается при move_node, удаляется при delete_node. В out_refs хранится явно как значение для имени path, без отдельного концепта ref_type.'
        - examples: [199]
      - "(#139) text — длина и допустимые символы":
        - text: text узла — строка длиной не более 1000 символов. Перевод строки \n разрешён (текст может быть многоабзацным внутри одной YAML-цитированной строки), табуляция \t запрещена. Многострочные YAML-литералы "|" и ">" не используются — \n кодируется внутри обычной двойной строки.
        - examples: [200]
      - "(#376) Root как точка входа":
        - text: Любая ссылка на id=0 в out_refs.path указывает на root. LLM, увидев id=0 впервые, может зафетчить его через get-nodes ids=[0] — узел отдаёт pointer на get-usage-guide; список top-level документов и folders доступен через get-in-refs --id=0 --name=path.
        - examples: [375]
    - definitions:
      - "(#8) узел": 'Атомарная единица в DocsWalker. Имеет ровно 5 полей: id (sequence-id, выдаёт ядро), type (имя типа из Схемы), title (1–2-словный path-сегмент), text (единица смысла, всегда одна строка), out_refs (исходящие связи как Map<имя, list<id>>).'
      - "(#9) связь (ref)": Направленная пара (имя_связи, id_цели), хранится в out_refs узла-источника. Имя связи — либо встроенное path, либо имя, объявленное в типе узла-источника как out_refs[name] в Схеме.
      - "(#83) out_refs": Поле узла, содержащее все его исходящие связи. Map<имя, list<id>>. Связь path присутствует у каждого узла кроме root (cardinality=one). Прочие связи объявляются типом узла-источника.
      - "(#84) in_refs": Вычисляемое представление «кто на меня ссылается». Получается обратным проходом по графу. В YAML-файлах не хранится, доступно через API.
      - "(#85) path": Встроенная связь ядра. У каждого узла кроме root — обязательная, cardinality=one. Цель — родитель в иерархии. В out_refs хранится явно как out_refs[path] = [parent_id]. Управляется ядром через структурные операции create_node / delete_node / move_node; через create_ref / delete_ref не правится.
      - "(#86) root": 'Синглтон ядра с id=0 — корень дерева path. С мета-схемы v6 объявлен как тип root в Схеме, с особенностью: нет path-ref (root не имеет родителя). Не персистится в YAML — синтезируется ядром на лету (title=имя FS-папки docs/, text=pointer на get-usage-guide, out_refs пуст). Точка входа для LLM: get-nodes ids=[0] возвращает узел; get-in-refs --id=0 --name=path даёт список top-level documents и folders.'
      - "(#184) folder": Структурный тип. Узел физически = каталог в docs/. Title_source=dirname (имя каталога). Идентификация через docs/.docswalker/folders.yml — там записывается id, parent_id и title для каждого folder-узла. Документы внутри подкаталога имеют path-связь на соответствующий folder, а не на root.
      - "(#185) folders.yml": 'Служебный файл docs/.docswalker/folders.yml — primary-источник folder-узлов. Формат — плоский YAML-список из mapping-записей с полями id, path (id родителя), title. Отсутствие или пустой файл = проект без подкаталогов. FS-каталоги в docs/ производны: расхождение «есть запись, нет каталога» / «есть каталог, нет записи» диагностируется как структурированная ошибка graph-load (folder_dir_missing / folder_record_missing) и не чинится автоматически.'
    - examples:
      - "(#196) Декларация": Чтобы добавить связь `related` к section, нужно сначала описать её в out_refs типа section в Схема.yml.
      - "(#197) Резервирование": После create-node sequence.txt инкрементируется на 1; новый id = новое значение sequence.txt.
      - "(#198) Параметр id": У create-node нет параметра --id; id присваивается ядром.
      - "(#199) После move-node": После move-node id=42 to=8 значение out_refs.path[0] становится 8.
      - "(#200) Длина и таб": Текст длиной 1500 символов отвергается с кодом text_too_long; текст со встроенным символом \t отвергается с кодом invalid_text. Текст с \n принимается.
      - "(#375) get-nodes id=0": Запрос get-nodes ids=[0] отдаёт {id:0, type:root, title:docs, text:Корень docs/. Briefing — get-usage-guide., out_refs:{}}.
  - "(#14) Идентификация и адресация":
    - statements:
      - "(#140) id и title": Узел адресуется по id. Для пользователя DocsWalker отдаёт id и title отдельными полями. Смысловые узлы в YAML серилизуются как single_key_mapping вида "(#id) title".
      - "(#141) Путь — цепочка path": Путь узла — цепочка path-связей до root. Доступна через API как массив id и как человекочитаемая строка title-сегментов; в YAML путь явно не хранится.
    - rules:
      - "(#142) Ссылки по id":
        - text: Все ссылки между узлами — по id, без хранения пути в YAML.
        - examples: [201]
      - "(#143) Rename без правки ссылок":
        - text: При rename узла id остаётся тем же; ссылки на узел не правятся.
        - examples: [202]
    - examples:
      - "(#201) В YAML": 'В out_refs хранится `related: [42, 8]`, не `related: [DocsWalker/Section]`.'
      - "(#202) Update title": После update-node id=42 --title=Новое все out_refs других узлов на 42 не правятся.
  - "(#15) Sequence-счётчик id":
    - statements:
      - "(#144) Файл sequence.txt": Счётчик id хранится в файле docs/.docswalker/sequence.txt. Содержимое — одно целое десятичное число, текущее положение sequence. Никаких других полей и форматов в файле нет.
    - rules:
      - "(#145) Старт с 0":
        - text: При первой инициализации DocsWalker создаёт sequence.txt со значением 0.
        - examples: [203]
      - "(#146) Инкремент при создании":
        - text: При создании узла DocsWalker увеличивает значение в sequence.txt на 1 и присваивает новое значение полю id создаваемого узла.
        - examples: [204]
      - "(#147) Монотонность":
        - text: При удалении узла id не возвращается обратно. Sequence монотонно растёт.
        - examples: [205]
      - "(#148) Без ручной правки":
        - text: Ручная правка sequence.txt запрещена.
        - examples: [206]
    - examples:
      - "(#203) Init": После первой инициализации DocsWalker файл sequence.txt содержит "0".
      - "(#204) Шаг": Если sequence.txt = 187, после create-node новый узел получает id=188 и sequence.txt = 188.
      - "(#205) После delete": После delete-nodes ids=42 значение sequence.txt не уменьшается; следующий id будет sequence.txt + 1.
      - "(#206) Только ядро": Изменять sequence.txt можно только через write-операции DocsWalker.
  - "(#16) Контракт валидации":
    - rules:
      - "(#149) Полный набор проверок":
        - text: 'Каждая операция записи применяется только если результирующее состояние docs/ проходит все проверки: meta_schema (Схема.yml соответствует мета-схеме); schema (изменяемый документ соответствует Схеме — соблюдены path_targets и out_refs контракты типов, cardinality каждой связи, required-связи заполнены, text_required соблюдается); refs (имя каждой связи в out_refs узла объявлено в типе источника или равно path; цель связи существует; тип цели входит в target_types связи; цикл по path невозможен); unique (id узла глобально уникален; title уникален среди siblings одного типа в одном path-родителе); sequence (значение sequence-счётчика покрывает максимальный id графа); style (длина text ≤1000 символов, отсутствие \t в title и text — см. ниже).'
        - examples: [207]
      - "(#150) Валидация по графу":
        - text: 'Валидатор работает по in-memory графу узлов: все проверки строятся вокруг 5 свойств Node (id, type, title, text, out_refs). Сырой YAML-текст файлов валидатор не разбирает — структурные нарушения YAML отлавливаются парсером SharpYaml на этапе загрузки, валидация структуры файла поверх парсера не дублируется.'
        - examples: [208]
      - "(#151) Style-проверка":
        - text: 'Style-проверка: title узла соответствует title_format его типа (для смысловых типов — формат "(#id) title"); title не содержит \n, \r, \t (всегда одна строка); text не содержит \r и \t, длина text не превышает 1000 символов (\n в text допустим). Превышение длины — text_too_long; запрещённый символ — invalid_text.'
        - examples: [209]
      - "(#152) Атомарность записи":
        - text: 'Запись атомарна: либо применяется целиком, либо файлы остаются без изменений и операция возвращает ошибку с диагностикой.'
        - examples: [210]
      - "(#153) Структурированные ошибки":
        - text: 'Ошибки возвращаются структурированно: код ошибки, id узла или координаты места ошибки, человекочитаемое сообщение, опциональный hint — короткая подсказка LLM-агенту «как починить» (имя команды, рекомендуемый порядок вызовов). Поле hint появляется только когда у ошибки есть осмысленная подсказка.'
        - examples: [211]
    - examples:
      - "(#207) Цепочка проверок": meta_schema → schema → refs → unique → sequence → style; первая ошибка останавливает запись.
      - "(#208) Не YAML": После загрузки docs/ валидатор работает с Node-объектами; сырой YAML повторно не парсится.
      - "(#209) Запрет таба": Текст с символом табуляции отвергается с кодом invalid_text на этапе style-проверки.
      - "(#210) Двух файлов": Если transaction правит два YAML-файла и второй упал — первый тоже не сохраняется.
      - "(#211) Формат ошибки": '{"code": "missing_parameter", "message": "...", "hint": "...", "describe_type": {"name": "rule", "text_required": true, "out_refs": [...]}} в stderr; describe_type появляется только если из контекста выводится тип узла, и его out_refs обрезан до проблемной связи (одной записи), если ошибка локализована именно на ней.'
  - "(#17) Операции чтения":
    - definitions:
      - "(#18) list_documents": Список всех структурных узлов уровня документа в docs/. Возвращает массив элементов с полями id, type ∈ {folder, document}, title, path. Без параметров.
      - "(#19) get_meta_schema": 'Полное описание мета-схемы в форме, пригодной для LLM. Используется как «инструкция по форме schema-файла» перед правкой Схема.yml. Возвращает все верхнеуровневые ключи docs/.docswalker/meta-schema.yml: типизированные шапки (meta_schema_version, name, description, primitive_types) и структурные секции (schema_root, tree_definition, type_definition, ref_def). Структурные секции отдаются generic-конвертацией yaml↔json: mapping → object, sequence → array, скаляры — bool/integer/string по форме (true/false → bool, целое → integer, иначе → string).'
      - "(#20) get_schema": Полное описание схемы — типы узлов, их title_source, text_required, path_targets и out_refs контракты. Используется как «инструкция по типам docs/» перед правкой обычных документов.
      - "(#21) get_map": Карта всех узлов docs/ — оглавление в форме дерева path-связей. Возвращает для каждого узла id, type, title, плюс метрики токенов tokens (на сам узел) и subtree_tokens (на узел вместе с потомками). Без text и out_refs. Аналог содержания книги; tokens нужны LLM, чтобы прикинуть бюджет перед загрузкой поддерева через get_subtree или get_nodes.
      - "(#22) get_nodes": Полные узлы по списку id. Параметры — ids (один или несколько id через запятую). Для каждого узла возвращает 5 концептуальных полей (id, type, title, text, out_refs Map<имя, list<id>> включая path) плюс метрики токенов tokens (только сам узел) и subtree_tokens (узел вместе с path-потомками).
      - "(#23) get_by_path": Полное поддерево узла по человекочитаемому пути. Параметр — path (строка вида "Документ" или "Документ/Раздел/Подраздел", разделитель "/"). Если path указывает на документ — возвращает полное содержимое YAML-файла в структурированной форме. Иначе — поддерево узла со всеми вложенными узлами. Используется для глубокого анализа без множества вызовов get_nodes.
      - "(#302) get_subtree": 'Поддерево узла в указанном tree-scope. Параметры — id (корень поддерева), tree (опц., имя tree-scope; по умолчанию "path"), depth (опц., максимальная глубина обхода: 0 — только корень, 1 — корень и один уровень потомков; без параметра — без ограничения), fields (опц., whitelist полей через запятую: id, type, title, text, out_refs, tokens, subtree_tokens; без параметра — все поля; id присутствует всегда). Возвращает {tree, root}, где root — узел с его полями плюс children (массив дочерних узлов в указанном дереве) и метриками tokens / subtree_tokens. Поля children и subtree_tokens сериализуются условно по правилу (#301) — отсутствие children означает узел-лист в текущем поддереве, отсутствие subtree_tokens означает subtree_tokens=tokens. Используется для бюджет-планирования перед вызовом get_nodes на конкретные узлы.'
      - "(#303) get_ancestors": Цепочка родителей узла в указанном tree-scope, от ближайшего родителя к корню дерева. Параметры — id (узел), tree (опц., имя tree-scope; по умолчанию "path"). Возвращает {tree, ancestors}, где ancestors — массив узлов (в формате get_nodes) в порядке от ближайшего родителя к корню. Если узел — корень scope (нет scope-ref для этого дерева), ancestors пуст. Для tree=path цепочка заканчивается над root (id=0); сам root в результат не включается. Единственный способ получить путь до корня одной командой — без него LLM пришлось бы итеративно дёргать get_nodes по out_refs[path].
      - "(#24) get_refs": 'Все связи узла в обе стороны. Параметры — id, name (опц., фильтр по имени связи). Возвращает {in: Map<имя_связи, [target-ids]>, out: Map<имя_связи, [target-ids]>}. Та же форма, что у out_refs в get_nodes и describe_type — единый контракт по всей API. Параметр name оставляет в обеих map-ах только запись с этим именем; если связей с таким именем нет — обе map-ы пустые объекты. Порядок id внутри списка — по возрастанию.'
      - "(#25) get_in_refs": Только входящие связи на узел. Параметры — id, name (опц., фильтр по имени связи). Возвращает Map<имя_связи, [source-ids]> непосредственно (без обёртки in/out, поскольку выводятся только входящие). Параметр name оставляет в map-е только запись с этим именем (или пустой объект, если связей нет). Порядок id — по возрастанию.
      - "(#26) search": Полнотекстовый поиск по title и text узлов. Параметр — query. Возвращает список id найденных узлов с фрагментами совпадений.
      - "(#70) check_integrity": 'Полный прогон валидатора на текущем состоянии docs/ без записи. Без параметров. Возвращает структуру {ok: bool, errors: [{code, message, path?, node_id?, hint?}]}. Сама команда не падает на ошибках графа — exit code 0; нарушения целостности — данные ответа, не CLI-ошибка. Используется LLM-агентом как sanity check перед цепочкой правок и для аудита после ручной правки YAML или миграции.'
      - "(#272) describe_type": 'Описание одного типа из Схемы в FS-агностичной форме. Параметр — name (имя типа). Возвращает {name, description?, text_required, out_refs:[{name, tree?, cardinality?, required?, target_types, description?}]}. Поля tree / cardinality / required в каждом ref выводятся условно: tree-refs получают только tree; non-tree-refs получают cardinality и required только когда они не равны дефолтам (cardinality=many, required=false), иначе поля опускаются. Поле title_source наружу не торчит — это контракт «движок ↔ docs/», LLM его не знает. Если тип не найден — type_not_found с hint списком доступных имён.'
      - "(#298) get_usage_guide": 'Manifest для LLM в начале сессии: ментальная модель + перечень tree-scope''ов (из Схемы) + manifest всех команд (имя, kind=read|write, описание, параметры с типами и описаниями, примеры) + слепок графа (total_nodes, root_children — id/type/title детей root, schema_types_count). Без параметров. Зови один раз перед цепочкой задач.'
  - "(#27) Операции записи":
    - rules:
      - "(#154) path как параметр create":
        - text: create_node принимает значение связи path как обязательный параметр для всех типов с непустым path_targets, кроме root. Прочие required-связи типа также обязательны и принимаются именованными параметрами.
        - examples: [212]
      - "(#155) Расширение Схемы вручную":
        - text: Введение нового имени связи (нового out_ref в типе) или нового типа узла делается прямой правкой docs/Схема.yml — отдельной API-команды нет. Изменение Схемы — отдельная транзакция, которую DocsWalker валидирует как обычный документ через мета-схему.
        - examples: [213]
      - "(#156) path только структурно":
        - text: Связь path управляется только структурными операциями create_node / delete_node / move_node. Через create_ref / delete_ref её менять нельзя.
        - examples: [214]
      - "(#186) folder write-операции":
        - text: create_node для folder создаёт каталог в docs/ и добавляет запись в folders.yml в одной транзакции; delete_node для folder допустим только для пустого каталога. update_node со сменой title переименовывает каталог в FS, правит запись в folders.yml и каскадно обновляет SourceFile у всех path-потомков; смена text у folder отвергается как invalid_field. move_node для folder перемещает каталог под нового parent (только folder или root), проверяет коллизию имени и цикл, каскадно правит SourceFile потомков.
        - examples: [215]
      - "(#373) Write-invalidation":
        - text: Каждая успешная write-команда инвалидирует затронутые id в seen-set всех активных sessions сервера — защищает LLM от просмотра устаревшего узла через placeholder. Подробности по списку id для каждой операции — (#358).
        - examples: [374]
    - definitions:
      - "(#28) create_node": Создать новый узел. Параметры — type (имя типа из Схемы), title (1–2-словный path-сегмент), text (если у типа text_required=true), плюс значения всех required связей контракта типа (включая path для всех типов с непустым path_targets — кроме root). Возвращает id созданного узла.
      - "(#29) update_node": Обновить title и/или text узла. Параметры — id, новый title (опц.), новый text (опц.). Не меняет ни одну связь — для правки связей нужен create_ref, delete_ref или move_node.
      - "(#30) delete_node": Удалить узел. Запрещено, если на него есть входящие связи (in_refs), кроме path-связей детей — они разрываются каскадно. Удаляет вместе с узлом все его исходящие связи. Параметр — id.
      - "(#72) move_node": Перенести узел к новому родителю в указанном tree-scope. Параметры — id (переносимый узел), to (id нового родителя в указанном дереве), tree (опц., имя tree-scope; по умолчанию path). Для tree=path значение to должно входить в path_targets типа переносимого узла; при переносе между документами в дереве path SourceFile у переносимого узла и всех его потомков обновляется. Для остальных tree-scope'ов меняется соответствующий tree-ref без правки SourceFile. Вход в собственное поддерево запрещён.
      - "(#31) create_ref": Создать связь. Параметры — from_id, name (имя связи, объявленной в out_refs типа узла-источника), to_id (тип цели должен входить в target_types этой связи). Связь path этой операцией не меняется — для path используется move_node.
      - "(#32) delete_ref": Удалить связь. Параметры — from_id, name, to_id. Запрещено, если связь имеет required=true и это её единственная цель.
      - "(#34) transaction": 'Атомарная пачка операций записи. Параметр — список операций любых из перечисленных выше (create_node, update_node, delete_node, move_node, create_ref, delete_ref). Применяется целиком или не применяется. Используется для составных изменений — переименование с одновременной правкой связанных узлов, перенос узла в одной транзакции с правкой полей, массовая правка. Контракт передачи operations: в CLI — JSON-строка одной --operations=[{...},{...}], в MCP — arguments.operations как array-of-object напрямую (inputSchema: type=array, items.type=object); серверный конвертер передаёт raw JSON-массив со скобками в CLI-вызов.'
    - examples:
      - "(#212) --path=": docswalker create-node --type=section --title=Новая --path=1 — path=id родителя.
      - "(#213) Новый out_ref": Добавление out_refs[name=related, target_types=[section]] в type_definition section в Схема.yml.
      - "(#214) move-node": Перенос узла под нового родителя — через docswalker move-node --id=42 --to=8, не через create-ref.
      - "(#215) Создание папки": docswalker create-node --type=folder --title=lang --path=0 создаёт каталог docs/lang/ и запись в folders.yml.
      - "(#374) Инвалидация после delete": '`get-nodes --ids=42` → 42 в seen. `delete-nodes --ids=42` → 42 удалён из seen всех sessions. Следующий `get-nodes --ids=42` в любой session получит node_not_found, а не placeholder с устаревшими данными.'
  - "(#35) CLI-интерфейс":
    - statements:
      - "(#157) Команды повторяют API": 'CLI-команды повторяют API один-в-один: имя команды — имя операции, аргументы — именованные ключи.'
    - rules:
      - "(#158) kebab-case команды":
        - text: Имена команд — kebab-case (преобразование snake_case → kebab).
        - examples: [216]
      - "(#159) --key=value":
        - text: Аргументы — в форме --key=value; имена ключей — kebab-case (например, --from-id, --to-id). Для create-node имена параметров required-связей берутся из контракта типа в Схеме (--path для встроенной связи path; --<имя_связи> для каждой required out_ref). Списочные параметры принимаются через запятую.
        - examples: [217]
      - "(#160) --root общий":
        - text: Общий параметр --root=<path> задаёт корень проекта (каталог, где лежит docs/). Для команды `kernel` параметр НЕ используется — kernel multi-root и не привязан к одному root при старте. Для команд-клиентов (read/write) и команды `repl` — auto-detect от cwd (ищет ближайший docs/ вверх по дереву); явный --root перебивает auto-detect и используется в HTTP-запросе к kernel-у. Для команды `mcp-server` — обязателен (фиксирует один root для MCP-канала); отсутствие → missing_parameter. Если каталог docs/ не найден — структурированная ошибка docs_not_found.
        - examples: [218]
      - "(#161) Успех в stdout":
        - text: 'Возврат успеха — exit code 0; в stdout — JSON-результат команды непосредственно (без обёртки {ok,result}). Шейп — специфика команды: read-команда возвращает объект или массив с данными ответа; одиночная write-команда — объект с полями результата операции и обязательным top-level-полем applied (true — изменения записаны на FS, false — это был dry-run). stderr при успехе пустой.'
        - examples: [219]
      - "(#162) transaction-result":
        - text: Команда transaction возвращает в stdout массив объектов в исходном порядке операций (без обёртки), по одному на каждую операцию входа. Каждый элемент имеет форму {op, ...поля результата операции, applied}. Поле op отличает шейп элемента от одиночного write-результата; applied повторяется в каждом элементе (значение одинаковое — transaction атомарна).
        - examples: [220]
      - "(#163) UTF-8 без BOM":
        - text: Кодировка stdout/stderr — UTF-8 без BOM. Кириллица и другие не-ASCII символы передаются как есть, без unicode-escape (без последовательностей вида backslash-u), чтобы экономить токены LLM-потребителя.
        - examples: [221]
      - "(#164) Ошибка в stderr":
        - text: 'Возврат ошибки — exit code ненулевой; в stderr — плоский JSON {code, message, path?, hint?, describe_type?} (без вложенного объекта error). Поля: code — машинный код ошибки; message — человекочитаемое сообщение; path — title документа без расширения и FS-префикса (только если ошибка локализована конкретным документом); hint — короткая подсказка LLM-агенту (только когда осмысленна); describe_type — описание типа из контекста (только когда из аргументов write-команды выводится тип узла, чьи правила нарушены). Если ошибка локализована на конкретной связи (missing_required_ref, invalid_ref_value и аналогичные), describe_type.out_refs содержит только проблемную связь — одну запись; шапка типа (name, description, text_required) присутствует всегда. Полный контракт типа LLM запрашивает отдельным describe-type --name=<X>. stdout при ошибке пустой.'
        - examples: [222]
      - "(#165) Коды CLI-ошибок":
        - text: На вход неизвестной команды CLI возвращает ошибку с кодом unknown_command, на отсутствующий обязательный параметр — missing_parameter, на лишний параметр — unknown_parameter, на нарушение формата значения — invalid_parameter.
        - examples: [223]
      - "(#269) dry-run":
        - text: Общий флаг --dry-run=true прогоняет write-команду до валидации включительно, но не пишет файлы и не обновляет sequence.txt. Возвращает обычный success-результат с полем applied=false на верхнем уровне (для transaction — applied=false в каждом элементе массива). На ошибку валидации — обычная ошибка validation_failed. Read-команды флаг не принимают (отвергают как unknown_parameter).
        - examples: [268]
      - "(#301) Опускаемые дефолты":
        - text: 'В JSON-выводе опускаются дефолты и пустоты, чтобы не тратить токены LLM на тривиальные значения. В RefDef (describe-type, get-schema): cardinality=many и required=false не сериализуются (отсутствие поля при чтении трактуется как дефолт). В get-map / get-subtree: children=[] не сериализуется (отсутствие поля children ⇒ узел-лист в текущем поддереве); subtree_tokens, равный tokens, не сериализуется (отсутствие поля ⇒ subtree_tokens = tokens). В get-usage-guide: parameters=[] и examples=[] не сериализуются (отсутствие поля ⇒ команда без параметров либо без примеров).'
        - examples: [300]
    - definitions:
      - "(#334) kernel": 'Команда запуска kernel-процесса. Особая команда — единственная, которая не делает HTTP-запрос к существующему kernel-у, а сама становится kernel-ом. Параметры: --quiet=true|false (опц., по умолчанию false; true глушит стартовый баннер в stderr — для headless и auto-spawn), --port=<int> (опц., по умолчанию 0 = выбор OS), --idle-eviction-min=<int> (опц., по умолчанию 10 — per-root eviction после N минут простоя). Поведение: захват per-user kernel.lock (#319) на время bind-а; bind HTTP на 127.0.0.1:<port>; запись pid/url/token в kernel.json (#320); release kernel.lock; loop accept HTTP-запросов до сигнала. Graceful-shutdown по SIGINT/SIGTERM/Ctrl+C — выгружает все root, удаляет kernel.json. Ошибки старта: kernel_already_running (kernel.json указывает на живой процесс), port_bind_failed.'
    - examples:
      - "(#36) Чтение нескольких узлов сразу": docswalker get-nodes --ids=1,8,42
      - "(#37) Карта документации": docswalker get-map
      - "(#38) Поддерево по пути": docswalker get-by-path --path="DocsWalker/Операции чтения"
      - "(#39) Все связи узла": docswalker get-refs --id=42
      - "(#40) Входящие связи на узел": docswalker get-in-refs --id=42
      - "(#41) Создание section": docswalker create-node --type=section --path=1 --title="Биекция текст ↔ граф"
      - "(#43) Создание именованной связи": docswalker create-ref --from-id=42 --name=related --to-id=8
      - "(#71) Проверка целостности docs/ без записи": docswalker check-integrity
      - "(#73) Перенос узла к новому родителю": docswalker move-node --id=42 --to=8
      - "(#216) Преобразование": Имя API create_node (snake_case) → команда CLI create-node (kebab-case).
      - "(#217) Имена ключей": --from-id=42, --to=8 — kebab; не --from_id=42 и не -t 8.
      - "(#218) Явный корень": docswalker get-map --root=/home/user/myproject ищет docs/ в указанном каталоге.
      - "(#219) Формат успеха": '{"id": 42, "title": "Новая", "applied": true} в stdout, exit 0.'
      - "(#220) Массив transaction": '[{"op":"create-node","id":188,"title":"foo","applied":true},{"op":"create-ref","applied":true}] в stdout — порядок исходных операций; applied в каждом элементе.'
      - "(#221) Кириллица в JSON": '{"title":"Назначение"}, не {"title":"\\u041d\\u0430\\u0437..."}.'
      - "(#222) Формат ошибки err": '{"code": "node_not_found", "message": "..."} в stderr, exit ≠ 0.'
      - "(#223) Коды CLI": docswalker bogus-cmd → unknown_command; docswalker get-nodes без --ids → missing_parameter.
      - "(#268) dry-run флаг": docswalker create-node --type=example --path=35 --title=foo --text=bar --dry-run=true → {"id":<new_id>,"title":"foo","applied":false} в stdout; файлы docs/ не изменяются.
      - "(#273) describe-type для одного типа": docswalker describe-type --name=section возвращает только этот тип в FS-агностичном виде; токенов меньше, чем у get-schema.
      - "(#299) get-usage-guide на старте сессии": 'docswalker get-usage-guide → один JSON со всем нужным: mental_model, trees[], commands[] (с примерами), graph_snapshot. После него LLM не нужны list-документов, get-schema или ручной разбор Commands.cs.'
      - "(#300) Дефолты в JSON": 'Узел-лист в get-map: {"id":42,"type":"rule","title":"foo","tokens":48} — без поля children (узел-лист), без subtree_tokens (subtree_tokens=tokens=48). RefDef в describe-type с дефолтами: {"name":"examples","target_types":["example"]} — без cardinality (=many), без required (=false).'
      - "(#335) Запуск kernel-а": docswalker kernel → bind на 127.0.0.1:<динамический-порт>, запись kernel.json в %LOCALAPPDATA%\\DocsWalker\\ (или $XDG_RUNTIME_DIR/docswalker/), баннер о готовности; процесс блокируется на сигнал. Auto-spawn клиентами (#311) — стандартный путь старта; ручной запуск нужен редко (диагностика, smoke-тест). Не-`kernel` команды auto-spawn делают сами при отсутствии kernel.json (#324 discovery).
  - "(#44) MCP-интерфейс":
    - statements:
      - "(#166) MCP-wrapper над kernel": 'MCP-сервер реализуется как тонкий stdio↔HTTP мост поверх kernel-а: принимает JSON-RPC tools/call по stdin от LLM-клиента, конвертирует в HTTP /rpc к kernel-у, проксирует ответ в stdout. MCP-wrapper не парсит docs/ и не держит граф — вся семантика на kernel-е.'
    - rules:
      - "(#364) JSON-RPC stdio":
        - text: Транспорт MCP — newline-delimited JSON-RPC 2.0 над stdin/stdout. Команды API регистрируются как MCP-tools; имя tool = kebab-case CLI-команды; параметры — JSON-Schema, выводимая из контракта команды.
        - examples: [365]
      - "(#366) Один root на MCP-wrapper":
        - text: MCP-wrapper запускается командой `docswalker mcp-server --root=<path>` — параметр --root фиксирует один docs/-root для всех tools/call в этом процессе. LLM-клиент вызывает MCP-tools без указания root — wrapper подставляет фиксированное значение в HTTP-запрос к kernel-у. Multi-root в одном MCP-канале не нужен — Claude Code запускает MCP-сервер раздельно для каждой записи в .mcp.json.
        - examples: [369]
      - "(#370) session_id из MCP-handshake":
        - text: session_id MCP-сессии берётся из MCP-initialize-handshake; живёт от initialize до закрытия stdio-канала. MCP-wrapper передаёт session_id в каждый JSON-RPC tools/call к kernel-у через arguments.session_id (#322). CLAUDE_CODE_SESSION_ID через MCP не приходит — Claude Code инжектирует её только в Bash-tool. /clear в Claude Code MCP-канал не закрывает; маркер-сброса seen-set на уровне транспорта нет — срабатывает первый get-usage-guide в этой session_id (#348).
        - examples: [371]
      - "(#377) inputSchema динамических tool":
        - text: "Для tool с динамическими параметрами (сейчас только create-node)\ninputSchema собирается из проектной Схемы (docs/Схема.yml) на старте\nmcp-server. Форма — JSON-Schema object с дискриминатором по полю\ntype: properties перечисляет все известные поля (type-enum, title,\ntext, все имена связей всех типов как optional — integer для\ncardinality=one, array+items=integer для cardinality=many), плюс\nуниверсальные root и dry-run. oneOf-ветка на каждый создаваемый тип\nфиксирует свой required: type, title, text при text_required=true,\npath-ref для типов с непустым path_targets, прочие required out_refs.\nТип root в enum не включается — он синтезируется ядром, через\ncreate-node не создаётся. Если Схему загрузить не удалось — tool\nотдаётся с базовой схемой без oneOf, warning в stderr; mcp-server\nне падает.\n"
        - examples: [378]
    - definitions:
      - "(#372) MCP-wrapper": 'Короткоживущий процесс DocsWalker, запущенный командой `docswalker mcp-server --root=<path>`, обслуживающий один MCP-клиент (например, Claude Code). Транспорт со стороны клиента — JSON-RPC 2.0 над stdio. Внутри: HTTP-клиент к kernel-у (auto-spawn если нужно), подмена root на фиксированное значение из --root, проксирование session_id из MCP-handshake. Не держит данных, не парсит docs/, не имеет своего lock — всё это на kernel-е (#317).'
    - examples:
      - "(#365) tools/call": MCP-tool `get-nodes` принимает {"ids":[42]} через MCP tools/call → проксируется в Dispatcher как `get-nodes --ids=42` → ответ маршалится в MCP-формат tools/call response (success-объект CLI или MCP-error для ошибки).
      - "(#369) Две базы знаний": '`.mcp.json` с двумя entries: docs-base-a (`--root=/path/A`) и docs-base-b (`--root=/path/B`) — два независимых MCP-wrapper-процесса, каждый с фиксированным --root. Оба ходят в один и тот же kernel (один на пользователя), но шлют разный root в HTTP-запросах. LLM видит tools как `docs-base-a__get_nodes` и `docs-base-b__get_nodes`; seen-set per-session_id, общий внутри kernel-а.'
      - "(#371) /clear в Claude Code": LLM делает /clear в Claude Code → MCP-канал не закрывается → session_id сохраняется; LLM первой командой зовёт get-usage-guide → сервер сбрасывает seen этой session_id и начинает чистый учёт.
      - "(#378) create-node oneOf для rule": Ветка oneOf для type=rule имеет required=[type,title,text,path,examples] — text_required=true плюс required out_ref examples (cardinality=many → array+items=integer). Для type=section ветка required=[type,title,path] — text не обязателен; sections/rules/notes/etc. остаются в properties как optional array+items=integer.
  - "(#45) Стек реализации":
    - rules:
      - "(#168) C# на LTS .NET":
        - text: Язык реализации — C# на актуальной LTS-версии .NET (см. Стек/Версия .NET). Все исполняемые компоненты публикуются через Native AOT (см. Стек/Нативная компиляция).
        - examples: [224]
      - "(#169) SharpYaml event-stream":
        - text: 'YAML-парсинг — внешняя .NET-библиотека SharpYaml (xoofx/SharpYaml). Используется только низкоуровневый event-stream API (Parser / EventReader / YamlStream); reflection-based Serializer не применяется как несовместимый с Native AOT. Принимаемое подмножество YAML 1.2: блочные mapping и sequence, flow-стиль для всех конструкций ([a, b, c] и {k: v, ...}), скаляры без кавычек, в одинарных и двойных кавычках, целые числа, true/false, комментарии "#". Допустимая структура задаётся Схемой и проверяется валидатором отдельно от парсера.'
        - examples: [225]
      - "(#170) Запрещённый YAML":
        - text: 'Не поддерживается: многострочные литералы "|" и ">", якоря "&" и "*", теги "!", директивы "%". Отлов этих конструкций — на стороне парсера SharpYaml (он отвергает их при разборе файла). Валидатор по сырому YAML не проходит и эти конструкции не ищет: его проверки построены поверх in-memory графа узлов.'
        - examples: [226]
      - "(#171) Свой emitter":
        - text: Сериализация YAML — собственный emitter, поддерживающий стилевые правила docs/ и склейку id+title по формату "(#id) title". Внешняя YAML-библиотека для записи не используется.
        - examples: [227]
      - "(#172) Единый парсер":
        - text: Парсинг мета-схемы и схемы — единым YAML-парсером (SharpYaml на event-stream API), как и обычные docs/*.yml. Отдельная JSON-зависимость для мета-схемы не вводится.
        - examples: [228]
      - "(#173) JSON для всех транспортов":
        - text: JSON используется для CLI stdout/stderr и для wire-протокола kernel-а (HTTP /rpc — JSON-RPC 2.0 body). YAML — только storage docs/. Сериализация — System.Text.Json с source-генераторами (JsonSerializerContext) для AOT-совместимости.
        - examples: [229]
      - "(#174) Без новых зависимостей":
        - text: Сторонние библиотеки не подключаются без явного решения.
        - examples: [230]
    - examples:
      - "(#224) .NET 10": На момент старта проекта — .NET 10 LTS, TargetFramework=net10.0 во всех csproj, global.json фиксирует 10.0.201.
      - "(#225) YAML-подмножество": Поддерживается block-mapping, flow-sequence, скаляры, true/false; не поддерживается |, якоря &, теги !.
      - "(#226) Стоп на парсере": 'YAML-файл с текстом text: |\n  multi\n  line падает на парсере SharpYaml ещё до валидатора.'
      - "(#227) Свой emitter": 'Emitter печатает смысловой узел как "(#42) Title": value — внешняя YAML-библиотека для записи не используется.'
      - "(#228) Один путь": И meta-schema.yml, и Схема.yml, и DocsWalker.yml идут через тот же SharpYaml.Parser.
      - "(#229) JSON только в CLI": Команды CLI отдают JSON в stdout; данные docs/ хранятся в YAML.
      - "(#230) Текущие зависимости": На сейчас — SharpYaml и xUnit (для тестов); добавление новой требует обоснования.
  - "(#304) Модель процесса":
    - statements:
      - "(#305) Один kernel на пользователя": DocsWalker запускает один long-lived kernel-процесс на пользователя ОС. Kernel — HTTP-сервер на 127.0.0.1, держит N графов docs/-репозиториев в RAM (multi-root в одном процессе) и маршрутизирует запросы по параметру root. Cold-start per-call устранён; cross-root state не делится.
      - "(#306) CLI/REPL/MCP — клиенты kernel-а": Все команды (включая интерактивный REPL и MCP-tools) исполняются клиентами, которые делают HTTP/JSON-RPC к kernel-у. CLI — короткоживущий клиент (один запрос → ответ → exit). REPL — длинная серия запросов в TTY. MCP-сервер — тонкий stdio↔HTTP мост (см. (#372)). Никакой клиент не парсит docs/ и не валидирует — вся семантика на kernel-е.
      - "(#307) Sole-writer гарантия": Kernel — единственный писатель в docs/. Внешние правки YAML руками или сторонним процессом DocsWalker запрещены контрактом (#294); kernel не использует FS-watcher, не сверяет checksum, не подхватывает внешние изменения. Это упраздняет race-условия с IDE, file-lock на данные и SHA256-инвалидацию seen-set.
    - rules:
      - "(#308) Sole-writer без file-lock на данные":
        - text: 'На файлы docs/ kernel НЕ берёт file-lock. Sole-writer-инвариант (#307) обеспечивается архитектурно: единственный процесс с правом записи — kernel; внешние правки запрещены контрактом (#294); kernel — long-lived, поэтому окно для внешних правок отсутствует. File-lock остаётся только на per-user spawn-race (#319).'
        - examples: [329]
      - "(#309) Multi-root в одном kernel":
        - text: 'Один kernel-процесс обслуживает все docs/-root пользователя. Запрос несёт параметр root (абсолютный путь к docs/) — kernel маршрутизирует к нужному графу через RootRegistry. Lazy-load: первый запрос на новый root триггерит загрузку графа в RAM. Несколько workspace''ов = одна точка входа, общий процесс, общий ресурс.'
        - examples: [332]
      - "(#310) HTTP loopback на 127.0.0.1":
        - text: Транспорт kernel-а — HTTP над TCP, bind на 127.0.0.1 (loopback only) с динамическим портом, выбираемым OS при старте. Внешние интерфейсы (0.0.0.0, IPv6, LAN) не открываются — снимает класс сетевых угроз (auth, encryption, экспозиция в LAN). ACL — только владелец процесса; kernel.json (#320) с портом и токеном лежит в per-user-каталоге с owner-only правами.
        - examples: [332]
      - "(#311) Auto-spawn разрешён, не silent":
        - text: 'Если клиент при попытке коннекта к kernel-у не нашёл kernel.json (#320) или kernel не отвечает на /health — клиент сам стартует kernel-процесс детачнуто (Windows DETACHED_PROCESS, POSIX double-fork). Auto-spawn НЕ silent: в stderr печатается «kernel spawned (pid=...)»; если spawn упал — exit ≠ 0, stderr {kernel_spawn_failed, message, stderr_tail}. Spawn-гонка между параллельными клиентами защищена per-user file-lock kernel.lock (#319).'
        - examples: [327]
      - "(#312) JSON-RPC 2.0 как контракт":
        - text: Wire-протокол kernel-а — JSON-RPC 2.0 над HTTP POST /rpc. Версионирование — поле jsonrpc:"2.0" + поле api_version в params. Mismatch версии client/kernel → JSON-RPC error response с code=version_mismatch; клиент печатает stderr и выходит ненулевым кодом. Бинарь kernel-а и клиента деплоятся одним артефактом — рассинхрон возможен только при ручном вмешательстве.
        - examples: [327]
      - "(#313) Per-root semaphore":
        - text: 'Kernel сериализует запросы на уровне ОДНОГО root: per-root SemaphoreSlim(1,1) держит порядок read/write по графу. Между разными root-ами параллелизм возможен — нагрузка на root A не блокирует root B. Read-параллелизм внутри одного root при необходимости вводится без смены wire-протокола (деталь реализации, не контракта). Глобальной сериализации запросов больше нет.'
        - examples: [336]
      - "(#314) Per-root idle eviction":
        - text: Если в течение 10 минут (default, конфигурируемо) на конкретный root не пришёл ни один запрос — kernel выгружает граф этого root из RAM (Dispose, GC). Сам kernel-процесс продолжает работать и принимать запросы; следующий запрос на выгруженный root — повторный lazy-load. Sole-writer (#307) гарантирует, что на диске уже актуальное состояние — синка не нужно.
        - examples: [331]
      - "(#315) REPL без persistent history":
        - text: REPL — отдельный процесс docswalker repl, длинноживущий HTTP-клиент к kernel-у. В пределах одной TTY-сессии доступен нативный line-edit платформы .NET 10. История между сессиями не сохраняется — для MVP не нужно, добавляется отдельной задачей при потребности.
        - examples: [337]
      - "(#316) Коды ошибок lifecycle":
        - text: 'Коды ошибок auto-spawn клиента: kernel_spawn_failed (не удалось стартовать процесс — нет прав, бинарь не найден, port_bind упал; описание в message + stderr_tail), kernel_handshake_failed (kernel-процесс жив, но /health не отвечает за timeout — порт занят чужим процессом, kernel завис), version_mismatch (api_version в JSON-RPC ответе не совпадает с клиентским). Коды ошибок самого kernel-а: port_bind_failed (Kestrel не смог взять порт), root_load_failed (root недоступен или невалидный YAML — kernel шлёт JSON-RPC error на запрос с этим root), root_not_found (параметр root указывает на несуществующий путь), kernel_already_running (kernel.json указывает на живой процесс при ручном запуске второго kernel-а). Все ошибки — exit ≠ 0 у клиента; форма stderr — стандартная плоская из (#164).'
        - examples: [327, 328]
    - definitions:
      - "(#317) kernel": Long-lived процесс DocsWalker, запущенный командой `docswalker kernel`. Один процесс на пользователя ОС. Слушает HTTP на 127.0.0.1:<динамический-порт>; держит N графов docs/-root в памяти (multi-root); маршрутизирует JSON-RPC tools/call по параметру root. Регистрирует свои координаты в kernel.json (#320). Стартует через auto-spawn от клиента (#311) или вручную. Завершается по SIGINT/SIGTERM/Ctrl+C либо по shutdown системы; графы выгружаются по per-root idle eviction (#314).
      - "(#318) клиент": 'Процесс DocsWalker, делающий HTTP/JSON-RPC к kernel-у. Виды: CLI (один запрос за вызов бинаря), REPL (TTY-сессия с серией запросов), MCP-wrapper (#372) — stdio↔HTTP мост для LLM-клиента. Алгоритм: читает kernel.json (#320), берёт url+token, проверяет /health, шлёт JSON-RPC tools/call с параметром root, читает ответ, проксирует в свой stdout/stderr. Если kernel.json нет или /health не отвечает — auto-spawn (#311). Никакого парсинга docs/ или валидации не делает.'
      - "(#319) kernel.lock": 'Per-user файл-семафор для защиты spawn-гонки kernel-а: %LOCALAPPDATA%\\DocsWalker\\kernel.lock (Windows) / $XDG_RUNTIME_DIR/docswalker/kernel.lock (POSIX). Захватывается на время spawn-процедуры; параллельный второй клиент видит lock → ждёт его освобождения → читает kernel.json. Lock на данные docs/ НЕ берётся — sole-writer (#307) обеспечивается архитектурно. Удаление файла без снятия — undefined behavior; штатно — release после публикации kernel.json.'
      - "(#320) kernel.json": 'Per-user discovery-файл координат kernel-а: %LOCALAPPDATA%\\DocsWalker\\kernel.json (Windows) / $XDG_RUNTIME_DIR/docswalker/kernel.json (POSIX). ACL — owner-only. Содержимое JSON: {pid, exe_path, url (http://127.0.0.1:<port>), token (для bearer-auth в HTTP), api_version, started_at}. Записывается kernel-ом после успешного bind-а порта; удаляется при graceful-shutdown. Stale-обнаружение — pid не жив или exe_path не совпадает с running-процессом → клиент трактует как «kernel не запущен» и делает auto-spawn (#311).'
      - "(#321) HTTP-эндпоинт kernel-а": 'Локальный HTTP-сервер kernel-а на Kestrel (ASP.NET Core minimal API). Эндпоинты: POST /rpc — JSON-RPC 2.0 main channel; GET /health — liveness, возвращает {ok, api_version, uptime_s}; GET /roots — список загруженных root-ов (диагностика). Bind 127.0.0.1:<port>; bearer-auth через token из kernel.json (#320). Один эндпоинт обслуживает все root и всех клиентов одновременно — диспетчеризация по полю root в JSON-RPC params.'
      - "(#322) JSON-RPC request": 'Один запрос — JSON-RPC 2.0 объект: {"jsonrpc":"2.0","id":<int>,"method":"tools/call","params":{"name":"<команда>","arguments":{<параметры>,"root":"<абсолютный-путь>","session_id":"<uuid>?"}}}. Поле root обязательно в каждом вызове — kernel роутит по нему. session_id опционально (как раньше — для context-aware фильтрации). Метод tools/call унифицирован для всех команд; для /health и /roots — обычный GET. Парсинг arguments делает kernel через тот же Dispatcher, что и одноразовый CLI.'
      - "(#323) JSON-RPC response": 'Один ответ — JSON-RPC 2.0 объект: успех {"jsonrpc":"2.0","id":<int>,"result":{"payload":<тот же JSON, что текущий stdout успешного ответа CLI из (#161)>}}; ошибка {"jsonrpc":"2.0","id":<int>,"error":{"code":<int>,"message":"...","data":{"code":"<строковый-код>","message":"...","hint":"..."?}}}. Клиент проксирует payload в stdout (успех) или data в stderr (ошибка) и устанавливает exit code (0 / ≠0).'
      - "(#324) discovery": 'Поиск координат kernel-а перед коннектом. Алгоритм клиента: 1) читает kernel.json (#320) из per-user-каталога; 2) если файла нет или он stale (pid мёртв / exe-path не совпадает) — переходит к auto-spawn (#311); 3) если есть — берёт url+token, делает GET /health; 4) если /health отвечает 200 в течение 2 секунд — считает kernel живым, шлёт rpc-запросы; 5) если /health не отвечает или Connection refused — kernel.json устарел или kernel завис, переход к auto-spawn (либо kernel_handshake_failed, если spawn-попытка только что была).'
    - examples:
      - "(#325) Запуск REPL": docswalker repl --root=. → процесс становится HTTP-клиентом к kernel-у; находит kernel.json (#320) или auto-spawns (#311); открывает prompt `dw> `; ввод argv-команды (без префикса `docswalker`) шлётся в kernel POST /rpc → ответ печатается; ввод `:quit` / `:exit` или EOF (Ctrl+D / Ctrl+Z) — выход REPL (kernel остаётся работать); одиночный Ctrl+C — отмена текущей строки, prompt перерисовывается.
      - "(#326) Auto-spawn kernel первым клиентом": 'docswalker get-map --root=/path/A (kernel не запущен) → клиент: 1) не находит kernel.json или /health не отвечает; 2) захватывает kernel.lock (#319); 3) ещё раз проверяет kernel.json (вдруг параллельный клиент уже поднял); 4) если нет — стартует `docswalker kernel` детачнуто (DETACHED_PROCESS / double-fork); 5) ждёт появления kernel.json + успешного /health (timeout 5 сек); 6) релизит lock; 7) делает rpc-запрос. Stderr клиента: «kernel spawned (pid=12345)»; stdout — обычный ответ команды.'
      - "(#327) Auto-spawn упал": docswalker get-map --root=. (kernel не запущен, и spawn падает — например, бинарь не найден или порт занят чужим процессом) → exit ≠ 0; stderr {"code":"kernel_spawn_failed","message":"...","hint":"проверь PATH/доступность порта 127.0.0.1","stderr_tail":"<последние строки stderr kernel-процесса>"}; stdout пуст. Клиент НЕ повторяет spawn автоматически — дальнейшие запросы тоже падают с тем же кодом до ручного вмешательства.
      - "(#328) Race на kernel.lock": 'Два клиентских процесса одновременно стартуют (kernel ещё не запущен): первый берёт kernel.lock (#319), стартует kernel-процесс, ждёт /health, релизит lock; второй ждёт на kernel.lock, после релиза читает свежий kernel.json и сразу шлёт rpc — без второго spawn-а. Никаких параллельных kernel-процессов на одного пользователя не возникает.'
      - "(#329) Внешняя правка YAML": Kernel запущен (always-running) → правка docs/foo.yml в IDE = нарушение контракта (#294); kernel не подхватывает изменения (нет FS-watcher), а первый же write-запрос через kernel перезапишет файл текущим in-memory графом, потеряв ручную правку. Штатный путь — все правки через DocsWalker-команды (CLI/REPL/MCP). Если ручная правка всё-таки нужна (миграция, восстановление) — пользователь гасит kernel (kill), правит YAML, запускает kernel заново.
      - "(#330) Кадры запроса/ответа": 'Запрос: POST /rpc, body {"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"get-nodes","arguments":{"ids":[1,8,42],"root":"/path/A","session_id":"3f1a-..."}}}. Ответ-успех: HTTP 200, body {"jsonrpc":"2.0","id":1,"result":{"payload":{"nodes":[...]}}}. Ответ-ошибка: HTTP 200, body {"jsonrpc":"2.0","id":1,"error":{"code":-32000,"message":"node_not_found","data":{"code":"node_not_found","message":"..."}}}.'
      - "(#331) Per-root eviction после простоя": Клиент шлёт запрос на /path/A → kernel грузит граф root A в RAM, отвечает; 10 минут на /path/A нет запросов → kernel выгружает граф A (Dispose); 11-я минута — клиент шлёт запрос на /path/A → kernel re-load, latency запроса = время на load (1-3 сек на средний docs/), дальше всё штатно. Клиент об eviction не знает — это деталь kernel-а.
      - "(#332) Multi-root в одном kernel": 'docswalker get-nodes --root=/path/A --ids=1 → kernel: lazy-load графа A, отвечает. docswalker get-nodes --root=/path/B --ids=1 (параллельно или следом) → kernel: lazy-load графа B, отвечает; графы A и B живут в одном процессе, читаются независимо (per-root semaphore #313), не конфликтуют. Cross-root запрос невозможен — каждый root — изолированный namespace id.'
      - "(#336) Per-root semaphore": 'Два клиента одновременно шлют write-команду в kernel: первый на root /path/A, второй на root /path/B → обрабатываются параллельно (per-root semaphore не пересекается). Два клиента одновременно шлют write на /path/A → второй ждёт первого в очереди семафора root A. Read-команды на A и B параллельно — также независимы.'
      - "(#337) REPL без истории сессий": Закрыли REPL (`:quit`), запустили `docswalker repl --root=.` снова → стрелка вверх возвращает только команды текущей REPL-сессии; история предыдущей не сохраняется. Kernel при этом продолжает работать в фоне — REPL-сессии независимы от kernel-процесса.
    - llm:
      - "(#333) Старт работы": Перед любой командой клиент сам обеспечит, что kernel запущен — auto-spawn встроен. Не пытайся управлять kernel-процессом вручную (не убивай, не рестартуй) — это нарушит spawn-протокол других клиентов; если kernel завис — баг ядра, репортить. Если запрос вернул kernel_spawn_failed — не повторяй авто, разбирайся с причиной (бинарь, порт, права).
  - "(#338) Контекст-aware-выдача":
    - statements:
      - "(#339) Цель раздела": DocsWalker минимизирует токены и шум контекста LLM, не повторяя уже-выданные узлы между запросами одной сессии и автоматически подтягивая концептуально-неотъемлемые связи. Поведение transport-агностично — работает на CLI и MCP одинаково, переключатель — наличие session_id в запросе.
    - rules:
      - "(#340) Auto-include":
        - text: 'При любой read-команде сервер транзитивно подтягивает цели всех non-tree required cross-refs узлов-результата (auto-include = `tree == null && required == true`). Подтянутые узлы проходят через тот же seen-фильтр, что и children. Отдельного поля в Схеме нет — семантика выводится из существующих `tree` и `required`. На текущей Схеме auto-include активен только для связи `rule.examples`. Шейп ответа: get-nodes возвращает auto-include-цели в основном плоском массиве после прямых id; get-subtree и get-by-path кладут их в top-level поле `auto_includes` (массив узлов или placeholder ов). При нулевом auto-include поле опускается, шейп идентичен дофиче.'
        - examples: [341]
      - "(#342) Источники session_id":
        - text: 'session_id — UUID, передаваемый в каждый запрос. Источники по транспортам: CLI читает env CLAUDE_CODE_SESSION_ID и шлёт в arguments.session_id JSON-RPC; MCP-wrapper берёт session_id из MCP-initialize-handshake и шлёт в arguments.session_id; REPL генерирует UUID на старте. Общий параметр `--session-id=<uuid>` перебивает env. Если все источники пусты — фильтрация не применяется, payload как до этой фичи.'
        - examples: [343]
      - "(#344) Placeholder для seen":
        - text: Узел, уже выданный в этой session_id, при повторном транзитивном попадании в payload заменяется на {"id":N,"seen":true} без других полей. Полный узел появляется только при первом упоминании в pre-order обходе ответа; повторы внутри одного ответа — placeholder.
        - examples: [345]
      - "(#346) Прямые id всегда полные":
        - text: Узлы, прямо запрошенные через --ids (get-nodes) или --id (get-subtree, get-by-path), всегда возвращаются полностью, даже если они в seen. Placeholder применяется только к транзитивно подтянутым узлам — children и auto-include-целям.
        - examples: [347]
      - "(#348) Reset на guide":
        - text: 'Первый вызов get-usage-guide в session_id сбрасывает её seen-set. Это маркер начала логической сессии: после /clear LLM первой командой зовёт guide (#298), сервер чистит учёт и начинает заново.'
        - examples: [349]
      - "(#350) --no-seen только на get-nodes":
        - text: Параметр --no-seen=true принимается только командой get-nodes; отключает фильтрацию для прямых id и их auto-include-целей (payload не фильтруется, но seen-set всё равно обновляется эмитнутыми id). На get-subtree и get-by-path отвергается как unknown_parameter.
        - examples: [351]
      - "(#352) Persistence сессий":
        - text: Seen-state каждой session_id хранится в `docs/.docswalker/sessions/<uuid>.yml` с полями created, last_used, seen (массив id). Запись на disk — лениво, на graceful shutdown сервера или при явной операции flush.
        - examples: [353]
      - "(#354) TTL=7d":
        - text: При старте сервера session-файлы с last_used старше 7 дней удаляются. TTL фиксирован, без настройки.
        - examples: [355]
      - "(#358) Write-invalidation":
        - text: 'После успешного write-вызова сервер удаляет затронутые id из seen-set всех активных sessions in-memory. Затронутые id зависят от типа операции: новый id (create-node), id обновляемого узла (update-node), все удалённые id (delete-nodes), id переносимого узла (move-node), id источника (create-ref / delete-ref), id всех источников переподшитых cross-refs (redirect-refs). Транзакция накапливает touched-id всех вложенных операций и инвалидирует одним проходом по sessions в конце.'
        - examples: [359]
    - definitions:
      - "(#360) session_id": UUID-идентификатор LLM-сессии. Передаётся в каждый запрос. На сервере связывается с seen-set этой сессии. Источник session_id зависит от транспорта (#342).
      - "(#361) seen-set": Множество id узлов, уже выданных в этой session_id за всё время её жизни. Хранится in-memory во время работы сервера; персистится в `docs/.docswalker/sessions/<uuid>.yml` лениво.
      - "(#362) placeholder": 'Сокращённая форма уже-выданного узла: {"id":N,"seen":true}. Применяется к транзитивно подтянутым узлам в read-ответах, не к прямо запрошенным id.'
      - "(#363) auto-include": Свойство связи `tree == null && required == true`. Read-команды транзитивно подтягивают цели таких связей. Отдельного поля в Схеме нет — семантика выводится из существующих полей.
    - examples:
      - "(#341) auto-include для rule.examples": На текущей Схеме auto-include активен только для связи rule.examples — единственная non-tree required связь. `get-nodes --ids=125` (rule «Запись через API») вернёт сам узел и узел (#188) — его пример.
      - "(#343) CLI-через-env": '`docswalker get-nodes --root=. --ids=42` под Claude Code Bash-tool: переменная CLAUDE_CODE_SESSION_ID уже инжектирована в env → CLI читает её, шлёт в JSON-RPC arguments.session_id; kernel ведёт seen-set для этой session_id (per-root).'
      - "(#345) Placeholder в subtree": '`get-nodes --ids=42` уже сделан → 42 в seen. Затем `get-subtree --id=1` возвращает поддерево, в котором узел 42 встречается среди children — на его месте {"id":42,"seen":true} без других полей.'
      - "(#347) Повтор прямого id": '`get-nodes --ids=42` сделан → 42 в seen. Повторный `get-nodes --ids=42` возвращает узел полностью; placeholder к прямым id не применяется.'
      - "(#349) /clear-маркер": LLM сделала /clear → потеряла контекст → первый вызов в session_id — get-usage-guide → сервер сбросил seen этой session_id; следующий read получает узлы в полной форме.
      - "(#351) --no-seen после /compact": После /compact LLM потеряла полную копию узла id=42 (только summary остался) → `get-nodes --ids=42 --no-seen=true` вернёт узел полностью, игнорируя seen-set. На `get-subtree --id=1 --no-seen=true` команда отвергается с unknown_parameter.
      - "(#353) Формат session-файла": '`docs/.docswalker/sessions/abc-uuid.yml`: created — ISO-8601 timestamp создания, last_used — ISO-8601 последнего обращения, seen — массив id вида [1, 8, 42, 188].'
      - "(#355) GC старого": session-файл с last_used = 2026-04-25 при старте сервера 2026-05-09 удаляется как expired (>7 дней).
      - "(#359) update-после-чтения": '`get-nodes --ids=42` → 42 в seen. `update-node --id=42 --text=новое` → 42 удалён из seen всех sessions. Следующий `get-nodes --ids=42` в любой session возвращает полный узел с новым text.'
  - "(#78) Атомизация и формат YAML смысловых узлов":
    - statements:
      - "(#179) Bullet → узел": Каждый бывший bullet-блок (statements, rules, may_rules, notes, llm) в section разворачивается в отдельный смысловой узел со своим id, type и title. text узла — формулировка, бывшая bare-string элементом списка. Это позволяет LLM фильтровать docs/ по одному правилу, одному определению или одному примеру, не подтягивая всю section.
      - "(#180) Дихотомия типов": 'Дихотомия типов: структурные (root, folder, document) идентифицируются файловой системой; смысловые (section, definition, example, statement, rule, may_rule, note, llm_hint) — inline-ключом YAML.'
    - rules:
      - "(#181) Расширение существующего формата":
        - text: 'Атомизация распространяет существующий формат definition/example на ex-bullets: до атомизации statements были голыми строками, после — single_key_mapping.'
        - examples: [233]
      - "(#182) inline_key для смысловых":
        - text: В Схеме каждый смысловой тип объявляет title_source=inline_key. Структурные типы используют filename или dirname.
        - examples: [234]
      - "(#183) id из sequence для атома":
        - text: id атома выдаётся sequence-счётчиком при создании, как для любого узла.
        - examples: [235]
    - definitions:
      - "(#79) формат смыслового узла": 'Single_key_mapping вида "(#id) title": value. id и title склеиваются в ключ, value — содержимое узла. Форма value диктуется контрактом типа: если text_required=true и нет out_refs — value = строка с текстом; если есть out_refs — value = mapping с сериализованными исходящими связями.'
      - "(#80) title как path-сегмент": title — 1–2-словное сжатие text узла, не display-name. Используется в path-навигации /Document/Section/Atom-title. Если для атома не находится естественного title — атом не нужен в graph (это шум, должен слиться с соседом или быть удалён).
    - examples:
      - "(#81) section с атомами": 'section "(#42) Биекция" имеет value=mapping с блоками statements, rules, …; внутри каждого блока — список single_key_mapping вида "(#100) Изоморфизм": Структура docs/ изоморфна графу узлов.'
      - "(#82) leaf-атом": '"(#100) Изоморфизм": Структура docs/ изоморфна графу узлов. — узел типа statement, id=100, title="Изоморфизм", text="Структура docs/ изоморфна графу узлов."'
      - "(#233) Было/стало": 'Было: statements: ["Структура изоморфна графу"]; стало: statements: ["(#100) Изоморфизм": "Структура изоморфна графу"].'
      - "(#234) title_source": 'В Схеме type_definition для rule: title_source=inline_key; для document: title_source=filename.'
      - "(#235) Создание атома": create-node --type=statement --title=Изоморфизм --text=... — id берётся из sequence.txt+1.
  - "(#274) Как LLM работает с DocsWalker":
    - statements:
      - "(#275) Граф = узлы + связи": Программа DocsWalker представляет docs/ как граф. Узлы — единицы смысла; связи — направленные именованные out_refs с известными именами и target_types. Никаких других сущностей у LLM нет.
      - "(#276) Только path в ФС": Дерево path — единственное физически материализованное (каталоги + файлы). Все остальные tree-scope'ы (например, strategic) — навигационные view'ы поверх графа, без отражения в ФС.
      - "(#277) LLM не видит файлы": LLM-агент работает только с узлами и связями через API. Имена файлов и каталогов наружу не торчат — ни в успешном ответе (нет полей с путями файлов), ни в поле path ошибки (там — только title документа без расширения и FS-префикса), ни в hint-ах. LLM не должна знать о существовании YAML-файлов и не должна на них опираться при написании запросов.
    - rules:
      - "(#280) Read → describe → write":
        - text: Перед любой write-операцией прочитай актуальное состояние интересующего поддерева (get-subtree) и контракт типа (describe-type), и только затем вызывай write-команду. Стейл-данные → invalid_parent / unknown_ref-имя в ответ.
        - examples: [279]
      - "(#282) Незнакомая задача — dry-run":
        - text: При первом подходе к незнакомому write-сценарию передай --dry-run=true в команду. Ответ покажет applied=false и набор валидаций; убедись, что результат ожидаемый, и только тогда повтори без флага.
        - examples: [281]
      - "(#284) Старт сессии — check-integrity":
        - text: В начале сессии (или после ручной правки YAML, миграции, восстановления из бэкапа) вызови check-integrity и убедись, что ok=true. Без этого write-операция может удариться в накопленные нарушения целостности и упасть с непрозрачной ошибкой.
        - examples: [283]
      - "(#286) delete-nodes без авто-каскада":
        - text: 'Удаление — только delete-nodes с явным набором --ids. Авто-каскада нет: LLM сама собирает набор через get-subtree (по любому tree-scope) и добавляет path-children каждого узла набора. Ошибки path_orphans_left и dangling_refs — обучающий сигнал, перечисляют недостающее.'
        - examples: [285]
      - "(#288) dangling_refs — redirect-refs или delete-ref":
        - text: Ошибка dangling_refs от delete-nodes означает, что на узлы из набора есть входящие cross-refs от узлов снаружи. Реши через redirect-refs (массово переподшить на другой узел) или серию delete-ref в transaction'е. Только после этого ретрай delete-nodes.
        - examples: [287]
      - "(#290) Tree-refs — только через move-node":
        - text: Tree-refs (path, strategic, любой объявленный scope) не редактируются через redirect-refs / create-ref / delete-ref. Для переподшивки в дереве используй move-node с явным --tree=<scope>; команда атомарно правит ровно один scope-ref у узла.
        - examples: [289]
      - "(#292) move-node default — path":
        - text: По умолчанию move-node работает в дереве path; без явного --tree=<scope> намерение переподшить узел в доменном дереве запустит реструктуризацию хранилища с каскадным переписыванием SourceFile. Указывай tree=<scope> явно, если двигаешь не в path.
        - examples: [291]
      - "(#294) Запрет ручной правки YAML и служебных файлов":
        - text: Правка любых файлов в docs/ (включая sequence.txt и folders.yml) в обход CLI запрещена — теряются sequence-инвариант, целостность графа, атомарность записи и path-child симметрия. Все правки — через DocsWalker.
        - examples: [293]
      - "(#296) Расширение Схемы — не задача LLM":
        - text: Объявить новый тип узла или новое имя связи в Схема.yml — структурная эволюция языка проекта, не runtime-операция. У LLM нет API-команды для этого; такую правку делает человек, и Схема перепроверяется валидатором как обычный YAML.
        - examples: [295]
    - definitions:
      - "(#278) root": 'Корень всего графа — синглтон с id=0, type=root. Любой обход начинается отсюда: get-subtree --id=0 даёт всё дерево path, get-refs --id=0 — все исходящие связи root. У root нет path-родителя.'
    - examples:
      - "(#279) Цепочка перед записью": get-subtree --id=42 → describe-type --name=section → create-node --type=section --path=42 ...
      - "(#281) dry-run перед боевой записью": docswalker create-node --type=rule --title=foo --text=... --path=42 --examples=99 --dry-run=true → applied=false; ответ покажет, что вернётся при реальном вызове.
      - "(#283) check-integrity на старте": docswalker check-integrity → ok=true и пустой errors[] перед цепочкой правок; ok=false → разбираться с errors до начала записи.
      - "(#285) Удаление поддерева вручную": 'Удалить project и все его tasks по дереву strategic: get-subtree --id=PROJECT --tree=strategic → собрать все id''ы поддерева → добавить path-children каждого через get-subtree --tree=path → передать всё списком в delete-nodes --ids=.'
      - "(#287) redirect-refs перед удалением": 'Перед delete-nodes на узел id=42, на который смотрят сторонние cross-refs: docswalker redirect-refs --from=42 --to=8 переподшивает все входящие cross-refs на узел id=8 одной командой; tree-refs (path и др.) этой командой не трогаются.'
      - "(#289) move-node в tree-scope": 'Переподшить subtask под другой parent_task в дереве strategic: docswalker move-node --id=SUBTASK --to=NEW_TASK --tree=strategic; без --tree команда работает в дереве path и запустит реструктуризацию хранилища.'
      - "(#291) move-node без --tree": docswalker move-node --id=42 --to=8 без --tree → tree=path по умолчанию → каскадное переписывание SourceFile у всех потомков и физический перенос между документами/папками. Нужен tree-scope, отличный от path? — указать явно.
      - "(#293) Без правки sequence.txt руками": 'Прямая правка sequence.txt → следующий create-node выдаст уже занятый id → duplicate_id. Восстановление: пересчитать sequence как max(id)+1 по графу — но проще не трогать вообще.'
      - "(#295) Новый out_ref в Схема.yml": Добавление новой связи (например, out_refs.related в типе section) — ручная правка docs/Схема.yml человеком; LLM этого не делает. После правки — check-integrity для верификации.
    - llm:
      - "(#297) describe-type экономит токены": Если для задачи нужен один тип — вызывай describe-type --name=<type>, не get-schema. Get-schema выдаёт всю Схему целиком; describe-type — только запрошенный тип в FS-агностичной форме (без title_source).
