description: Описание типов узлов проекта DocsWalker. Schema-файл валидируется по docs/.docswalker/meta-schema.yml (v4) и сам валидирует все остальные docs/*.yml.
types:
  - name: folder
    description: Каталог в docs/. Структурный узел, группирует documents и подпапки. Title — имя каталога. Узел не несёт собственного текста.
    title_source: dirname
    text_required: false
    path_targets:
      - root
      - folder
  - name: document
    description: YAML-файл в docs/. Один файл — один документ. Title — имя файла без расширения. text — однострочное описание-summary документа.
    title_source: filename
    text_required: true
    path_targets:
      - root
      - folder
    out_refs:
      - name: sections
        target_types:
          - section
        cardinality: many
        required: false
        description: Список разделов документа в порядке появления в YAML.
  - name: section
    description: Раздел документа. Структурный узел, контейнер атомов. Title — короткое название раздела (1–3 слова), text — пустой (смысл несут атомы внутри).
    title_source: inline_key
    text_required: false
    path_targets:
      - document
    out_refs:
      - name: statements
        target_types:
          - statement
        cardinality: many
        required: false
        description: Утверждения о предмете раздела.
      - name: rules
        target_types:
          - rule
        cardinality: many
        required: false
        description: Правила раздела. Модальность (обязательная или запрещающая) выражается формулировкой текста.
      - name: may_rules
        target_types:
          - may_rule
        cardinality: many
        required: false
        description: Допускающие правила.
      - name: notes
        target_types:
          - note
        cardinality: many
        required: false
        description: Заметки.
      - name: definitions
        target_types:
          - definition
        cardinality: many
        required: false
        description: Определения терминов.
      - name: examples
        target_types:
          - example
        cardinality: many
        required: false
        description: Примеры.
      - name: llm
        target_types:
          - llm_hint
        cardinality: many
        required: false
        description: Указания для LLM, не подлежащие изложению пользователю.
  - name: statement
    description: Утверждение в section. Атом-лист. text — формулировка утверждения; title — 1–2-словное сжатие.
    title_source: inline_key
    text_required: true
    path_targets:
      - section
  - name: rule
    description: Правило в section. Атом-лист. text — формулировка правила; title — 1–2-словное сжатие.
    title_source: inline_key
    text_required: true
    path_targets:
      - section
  - name: may_rule
    description: Допускающее правило в section. Атом-лист.
    title_source: inline_key
    text_required: true
    path_targets:
      - section
  - name: note
    description: Заметка в section. Атом-лист.
    title_source: inline_key
    text_required: true
    path_targets:
      - section
  - name: definition
    description: Определение термина в section. Атом-лист. title — определяемый термин, text — содержание определения.
    title_source: inline_key
    text_required: true
    path_targets:
      - section
  - name: example
    description: Пример в section. Атом-лист. title — подпись или ссылка примера, text — содержимое примера.
    title_source: inline_key
    text_required: true
    path_targets:
      - section
  - name: llm_hint
    description: Указание для LLM в section. Атом-лист.
    title_source: inline_key
    text_required: true
    path_targets:
      - section
