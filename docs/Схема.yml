description: Описание типов узлов проекта DocsWalker. Schema-файл валидируется по docs/.docswalker/meta-schema.yml (v5) и сам валидирует все остальные docs/*.yml.
trees:
  - name: path
    description: |
      Дерево хранилища. Каждый узел кроме root имеет ровно один path-ref,
      указывающий на его родителя. Только это дерево используется ядром
      для физического размещения узлов в файловой системе и для каскадных
      проверок при удалении.
types:
  - name: root
    description: Корневой синглтон графа (узел с id=0). Точка входа для LLM. Не персистится в YAML — синтезируется ядром на лету. title всегда равен имени FS-папки docs/. У типа нет path-ref (root не имеет родителя в дереве хранилища) и нет других out_refs (top-level узлы — folder и document — находятся через get-in-refs --id=0 --name=path).
    title_source: dirname
    text_required: false
    out_refs: []
  - name: folder
    description: Каталог в docs/. Структурный узел, группирует documents и подпапки. Title — имя каталога. Узел не несёт собственного текста.
    title_source: dirname
    text_required: false
    out_refs:
      - name: path
        tree: path
        target_types:
          - root
          - folder
        description: Размещение каталога в дереве хранилища.
  - name: document
    description: YAML-файл в docs/. Один файл — один документ. Title — имя файла без расширения. text — описание-summary документа (≤1000 символов; \n допустим).
    title_source: filename
    text_required: true
    out_refs:
      - name: path
        tree: path
        target_types:
          - root
          - folder
        description: Размещение документа в дереве хранилища.
      - name: sections
        target_types:
          - section
        cardinality: many
        required: false
        description: Список разделов документа в порядке появления в YAML.
  - name: section
    description: Раздел документа. Структурный узел, контейнер атомов. Title — короткое название раздела (1–3 слова), text — пустой (смысл несут атомы внутри).
    title_source: inline_key
    text_required: false
    out_refs:
      - name: path
        tree: path
        target_types:
          - document
        description: Размещение раздела в документе.
      - name: statements
        target_types:
          - statement
        cardinality: many
        required: false
        description: Утверждения о предмете раздела.
      - name: rules
        target_types:
          - rule
        cardinality: many
        required: false
        description: Правила раздела. Модальность (обязательная или запрещающая) выражается формулировкой текста.
      - name: may_rules
        target_types:
          - may_rule
        cardinality: many
        required: false
        description: Допускающие правила.
      - name: notes
        target_types:
          - note
        cardinality: many
        required: false
        description: Заметки.
      - name: definitions
        target_types:
          - definition
        cardinality: many
        required: false
        description: Определения терминов.
      - name: examples
        target_types:
          - example
        cardinality: many
        required: false
        description: Примеры.
      - name: llm
        target_types:
          - llm_hint
        cardinality: many
        required: false
        description: Указания для LLM, не подлежащие изложению пользователю.
  - name: statement
    description: Утверждение в section. Атом-лист. text — формулировка утверждения; title — 1–2-словное сжатие.
    title_source: inline_key
    text_required: true
    out_refs:
      - name: path
        tree: path
        target_types:
          - section
        description: Размещение утверждения в разделе.
  - name: rule
    description: Правило в section. Атом-лист. text — формулировка правила; title — 1–2-словное сжатие.
    title_source: inline_key
    text_required: true
    out_refs:
      - name: path
        tree: path
        target_types:
          - section
        description: Размещение правила в разделе.
      - name: examples
        target_types:
          - example
        cardinality: many
        required: true
        description: Примеры применения правила. Минимум один.
  - name: may_rule
    description: Допускающее правило в section. Атом-лист.
    title_source: inline_key
    text_required: true
    out_refs:
      - name: path
        tree: path
        target_types:
          - section
        description: Размещение правила в разделе.
  - name: note
    description: Заметка в section. Атом-лист.
    title_source: inline_key
    text_required: true
    out_refs:
      - name: path
        tree: path
        target_types:
          - section
        description: Размещение заметки в разделе.
  - name: definition
    description: Определение термина в section. Атом-лист. title — определяемый термин, text — содержание определения.
    title_source: inline_key
    text_required: true
    out_refs:
      - name: path
        tree: path
        target_types:
          - section
        description: Размещение определения в разделе.
  - name: example
    description: Пример в section. Атом-лист. title — подпись или ссылка примера, text — содержимое примера.
    title_source: inline_key
    text_required: true
    out_refs:
      - name: path
        tree: path
        target_types:
          - section
        description: Размещение примера в разделе.
  - name: llm_hint
    description: Указание для LLM в section. Атом-лист.
    title_source: inline_key
    text_required: true
    out_refs:
      - name: path
        tree: path
        target_types:
          - section
        description: Размещение указания в разделе.
