description: |
  Описание типов узлов проекта DocsWalker. Schema-файл валидируется по docs/.docswalker/meta-schema.yml (v6) и сам валидирует все остальные docs/*.yml.

trees:
  - name: path
    description: |
      Дерево хранилища. Каждый узел кроме root имеет ровно один path-ref,
      указывающий на его родителя. Только это дерево используется ядром
      для физического размещения узлов в файловой системе и для каскадных
      проверок при удалении.
  - name: subject
    description: |
      Тематический классификатор: предмет узла (api/read, api/write, schema, runtime, …).
      Required tree-ref на каждом атом-узле. Корень — root (id=0); категории
      первого уровня имеют subject_parent=root, остальные — родительскую категорию.
  - name: subsystem
    description: |
      Подсистемный классификатор: подсистема DocsWalker (core, kernel, cli, mcp, …).
      Required tree-ref на каждом атом-узле.
  - name: audience
    description: |
      Аудиторный классификатор: для кого предназначен узел (llm-agent, developer).
      Required tree-ref на каждом атом-узле.
  - name: csharp_structure
    description: |
      C#-структурный классификатор: где в коде живёт описанное в узле
      (solution → project → namespace → class). Большинство узлов docs/ — `none`.
      Required tree-ref на каждом атом-узле.

types:
  - name: root
    title_source: filename
    text_required: false
    description: |
      Корневой синглтон графа (узел с id=0). Точка входа для LLM. Не персистится в YAML — синтезируется ядром на лету. title всегда равен имени FS-папки docs/. У типа нет path-ref (root не имеет родителя в дереве хранилища) и нет других out_refs (top-level узлы — folder и document — находятся через get-in-refs --id=0 --name=path).

  - name: folder
    title_source: dirname
    text_required: false
    description: |
      Каталог в docs/. Структурный узел, группирует documents и подпапки. Title — имя каталога. Узел не несёт собственного текста.
    out_refs:
      - name: path
        target_types: [root, folder]
        tree: path
        unique_sibling_titles: true
        description: Размещение каталога в дереве хранилища.

  - name: document
    title_source: filename
    text_required: true
    description: |
      YAML-файл в docs/. Один файл — один документ. Title — имя файла без расширения. text — описание-summary документа (≤1000 символов; \n допустим).
    out_refs:
      - name: path
        target_types: [root, folder]
        tree: path
        unique_sibling_titles: true
        description: Размещение документа в дереве хранилища.
      - name: sections
        target_types: [section]
        cardinality: many
        required: false
        description: Список разделов документа в порядке появления в YAML.

  - name: section
    title_source: inline_key
    text_required: false
    description: |
      Раздел документа. Структурный узел, контейнер атомов. Title — короткое название раздела (1–3 слова), text — пустой (смысл несут атомы внутри).
    out_refs:
      - name: path
        target_types: [document]
        tree: path
        unique_sibling_titles: true
        description: Размещение раздела в документе.
      - name: statements
        target_types: [statement]
        cardinality: many
        required: false
        description: Утверждения о предмете раздела.
      - name: rules
        target_types: [rule]
        cardinality: many
        required: false
        description: Правила раздела. Модальность (обязательная или запрещающая) выражается формулировкой текста.
      - name: may_rules
        target_types: [may_rule]
        cardinality: many
        required: false
        description: Допускающие правила.
      - name: notes
        target_types: [note]
        cardinality: many
        required: false
        description: Заметки.
      - name: definitions
        target_types: [definition]
        cardinality: many
        required: false
        description: Определения терминов.
      - name: examples
        target_types: [example]
        cardinality: many
        required: false
        description: Примеры.
      - name: llm
        target_types: [llm_hint]
        cardinality: many
        required: false
        description: Указания для LLM, не подлежащие изложению пользователю.
      - name: subject_categories
        target_types: [subject_category]
        cardinality: many
        required: false
        description: Категории классификатор-дерева 'subject', живущие в этом разделе (inline_key children).
      - name: subsystem_categories
        target_types: [subsystem_category]
        cardinality: many
        required: false
        description: Категории классификатор-дерева 'subsystem', живущие в этом разделе.
      - name: audience_categories
        target_types: [audience_category]
        cardinality: many
        required: false
        description: Категории классификатор-дерева 'audience', живущие в этом разделе.
      - name: csharp_structure_categories
        target_types: [csharp_structure_category]
        cardinality: many
        required: false
        description: Категории классификатор-дерева 'csharp_structure', живущие в этом разделе.

  - name: statement
    title_source: inline_key
    text_required: true
    description: |
      Утверждение в section. Атом-лист. text — формулировка утверждения; title — 1–2-словное сжатие.
    out_refs:
      - name: path
        target_types: [section]
        tree: path
        unique_sibling_titles: true
        description: Размещение утверждения в разделе.
      - name: subject
        target_types: [subject_category]
        tree: subject
        description: Тематический классификатор.
      - name: subsystem
        target_types: [subsystem_category]
        tree: subsystem
        description: Подсистемный классификатор.
      - name: audience
        target_types: [audience_category]
        tree: audience
        description: Аудиторный классификатор.
      - name: csharp_structure
        target_types: [csharp_structure_category]
        tree: csharp_structure
        description: C#-структурный классификатор.

  - name: rule
    title_source: inline_key
    text_required: true
    description: |
      Правило в section. Атом-лист. text — формулировка правила; title — 1–2-словное сжатие.
    out_refs:
      - name: path
        target_types: [section]
        tree: path
        unique_sibling_titles: true
        description: Размещение правила в разделе.
      - name: examples
        target_types: [example]
        cardinality: many
        required: true
        description: Примеры применения правила. Минимум один.
      - name: subject
        target_types: [subject_category]
        tree: subject
        description: Тематический классификатор.
      - name: subsystem
        target_types: [subsystem_category]
        tree: subsystem
        description: Подсистемный классификатор.
      - name: audience
        target_types: [audience_category]
        tree: audience
        description: Аудиторный классификатор.
      - name: csharp_structure
        target_types: [csharp_structure_category]
        tree: csharp_structure
        description: C#-структурный классификатор.

  - name: may_rule
    title_source: inline_key
    text_required: true
    description: |
      Допускающее правило в section. Атом-лист.
    out_refs:
      - name: path
        target_types: [section]
        tree: path
        unique_sibling_titles: true
        description: Размещение правила в разделе.
      - name: subject
        target_types: [subject_category]
        tree: subject
        description: Тематический классификатор.
      - name: subsystem
        target_types: [subsystem_category]
        tree: subsystem
        description: Подсистемный классификатор.
      - name: audience
        target_types: [audience_category]
        tree: audience
        description: Аудиторный классификатор.
      - name: csharp_structure
        target_types: [csharp_structure_category]
        tree: csharp_structure
        description: C#-структурный классификатор.

  - name: note
    title_source: inline_key
    text_required: true
    description: |
      Заметка в section. Атом-лист.
    out_refs:
      - name: path
        target_types: [section]
        tree: path
        unique_sibling_titles: true
        description: Размещение заметки в разделе.
      - name: subject
        target_types: [subject_category]
        tree: subject
        description: Тематический классификатор.
      - name: subsystem
        target_types: [subsystem_category]
        tree: subsystem
        description: Подсистемный классификатор.
      - name: audience
        target_types: [audience_category]
        tree: audience
        description: Аудиторный классификатор.
      - name: csharp_structure
        target_types: [csharp_structure_category]
        tree: csharp_structure
        description: C#-структурный классификатор.

  - name: definition
    title_source: inline_key
    text_required: true
    description: |
      Определение термина в section. Атом-лист. title — определяемый термин, text — содержание определения.
    out_refs:
      - name: path
        target_types: [section]
        tree: path
        unique_sibling_titles: true
        description: Размещение определения в разделе.
      - name: subject
        target_types: [subject_category]
        tree: subject
        description: Тематический классификатор.
      - name: subsystem
        target_types: [subsystem_category]
        tree: subsystem
        description: Подсистемный классификатор.
      - name: audience
        target_types: [audience_category]
        tree: audience
        description: Аудиторный классификатор.
      - name: csharp_structure
        target_types: [csharp_structure_category]
        tree: csharp_structure
        description: C#-структурный классификатор.

  - name: example
    title_source: inline_key
    text_required: true
    description: |
      Пример в section. Атом-лист. title — подпись или ссылка примера, text — содержимое примера.
    out_refs:
      - name: path
        target_types: [section]
        tree: path
        unique_sibling_titles: true
        description: Размещение примера в разделе.
      - name: subject
        target_types: [subject_category]
        tree: subject
        description: Тематический классификатор.
      - name: subsystem
        target_types: [subsystem_category]
        tree: subsystem
        description: Подсистемный классификатор.
      - name: audience
        target_types: [audience_category]
        tree: audience
        description: Аудиторный классификатор.
      - name: csharp_structure
        target_types: [csharp_structure_category]
        tree: csharp_structure
        description: C#-структурный классификатор.

  - name: llm_hint
    title_source: inline_key
    text_required: true
    description: |
      Указание для LLM в section. Атом-лист.
    out_refs:
      - name: path
        target_types: [section]
        tree: path
        unique_sibling_titles: true
        description: Размещение указания в разделе.
      - name: subject
        target_types: [subject_category]
        tree: subject
        description: Тематический классификатор.
      - name: subsystem
        target_types: [subsystem_category]
        tree: subsystem
        description: Подсистемный классификатор.
      - name: audience
        target_types: [audience_category]
        tree: audience
        description: Аудиторный классификатор.
      - name: csharp_structure
        target_types: [csharp_structure_category]
        tree: csharp_structure
        description: C#-структурный классификатор.

  - name: subject_category
    title_source: inline_key
    text_required: false
    description: |
      Узел-категория классификатор-дерева 'subject'. Лежит inline_key под section
      (поле subject_categories) или под другой subject_category (поле children).
      subject_parent — tree-ref в дереве subject: либо root (категория первого уровня),
      либо родительская категория. text — необязательное короткое описание.
    out_refs:
      - name: path
        target_types: [section, subject_category]
        tree: path
        unique_sibling_titles: true
        description: Размещение категории в path-дереве.
      - name: subject_parent
        target_types: [root, subject_category]
        tree: subject
        unique_sibling_titles: true
        description: Родительская категория в classifier-дереве subject.
      - name: children
        target_types: [subject_category]
        cardinality: many
        required: false
        description: Дочерние категории (inline_key children в YAML родителя).

  - name: subsystem_category
    title_source: inline_key
    text_required: false
    description: |
      Узел-категория классификатор-дерева 'subsystem'. Структура аналогична subject_category.
    out_refs:
      - name: path
        target_types: [section, subsystem_category]
        tree: path
        unique_sibling_titles: true
        description: Размещение категории в path-дереве.
      - name: subsystem_parent
        target_types: [root, subsystem_category]
        tree: subsystem
        unique_sibling_titles: true
        description: Родительская категория в classifier-дереве subsystem.
      - name: children
        target_types: [subsystem_category]
        cardinality: many
        required: false
        description: Дочерние категории.

  - name: audience_category
    title_source: inline_key
    text_required: false
    description: |
      Узел-категория классификатор-дерева 'audience'. Структура аналогична subject_category.
    out_refs:
      - name: path
        target_types: [section, audience_category]
        tree: path
        unique_sibling_titles: true
        description: Размещение категории в path-дереве.
      - name: audience_parent
        target_types: [root, audience_category]
        tree: audience
        unique_sibling_titles: true
        description: Родительская категория в classifier-дереве audience.
      - name: children
        target_types: [audience_category]
        cardinality: many
        required: false
        description: Дочерние категории.

  - name: csharp_structure_category
    title_source: inline_key
    text_required: false
    description: |
      Узел-категория классификатор-дерева 'csharp_structure'. Иерархия solution → project → namespace → class.
    out_refs:
      - name: path
        target_types: [section, csharp_structure_category]
        tree: path
        unique_sibling_titles: true
        description: Размещение категории в path-дереве.
      - name: csharp_structure_parent
        target_types: [root, csharp_structure_category]
        tree: csharp_structure
        unique_sibling_titles: true
        description: Родительская категория в classifier-дереве csharp_structure.
      - name: children
        target_types: [csharp_structure_category]
        cardinality: many
        required: false
        description: Дочерние категории.