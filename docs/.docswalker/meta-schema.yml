meta_schema_version: 4
name: DocsWalker Meta-Schema
description: Описывает форму schema-файла проекта (например, docs/Схема.yml). Schema-файл задаёт типы узлов проекта; узлы связаны направленными исходящими связями (out_refs) с явно объявленным контрактом в типе узла-источника.
primitive_types:
  - string
  - text
  - bool
  - enum
  - list
schema_root:
  description: Корневой объект schema-файла.
  fields:
    - name: description
      type: string
      required: true
      description: Однострочное описание схемы.
    - name: types
      type: list
      of: type_definition
      required: true
      description: Список определений типов проекта.
  constraints:
    - Дополнительные ключи на корневом уровне не допускаются.
    - Имена типов уникальны в пределах schema-файла.
    - Идентификация schema-файла — по имени файла (см. Правила оформления/Идентификация документа); внутреннего поля schema/document не объявляется.
    - 'Имя ''root'' зарезервировано: обозначает корневой синглтон ядра DocsWalker (узел с id=0). Не объявляется как тип, но допустимо в path_targets и target_types.'
    - 'Связь ''path'' — встроенная связь ядра. У каждого узла кроме root она обязательна и cardinality=one. В типах не объявляется через out_refs; её допустимые цели контролируются через path_targets.'
type_definition:
  description: Описание одного типа узла. Тип задаёт, где узел может находиться (path_targets), какие исходящие связи у него допустимы (out_refs) и требуется ли непустой text.
  fields:
    - name: name
      type: string
      required: true
      description: Имя типа (snake_case).
    - name: description
      type: text
      required: false
      description: Назначение типа.
    - name: title_source
      type: enum
      values:
        - filename
        - dirname
        - inline_key
      required: true
      description: 'Откуда узел типа берёт title: имя файла без расширения (filename), имя каталога (dirname) или ключ mapping в YAML родителя (inline_key).'
    - name: text_required
      type: bool
      required: true
      description: 'Обязателен ли непустой text у узла этого типа: у структурных типов (folder, section) — обычно false; у смысловых (statement, rule, definition, note, …) — true.'
    - name: path_targets
      type: list
      of: string
      required: true
      description: Имена типов (включая зарезервированное ''root''), которые могут быть на конце встроенной связи path у узла этого типа — то есть где этот узел может располагаться в иерархии. Пустой список запрещён.
    - name: out_refs
      type: list
      of: ref_def
      required: false
      description: Список объявлений исходящих связей (кроме встроенной path). Если опущен — узел типа не имеет дополнительных out_refs.
  constraints:
    - 'title_source=inline_key допустим, только если узел типа размещается внутри YAML родителя как ключ mapping (а не как отдельный файл/каталог).'
    - Имена связей в out_refs уникальны в пределах одного type_definition.
    - 'Имя ''path'' зарезервировано — не используется в out_refs.'
ref_def:
  description: Объявление одной исходящей связи в типе узла-источника.
  fields:
    - name: name
      type: string
      required: true
      description: Имя связи (snake_case). Используется как ключ в out_refs узла и как имя параметра API/CLI.
    - name: target_types
      type: list
      of: string
      required: true
      description: Имена типов (включая ''root''), на которые может ссылаться эта связь. Пустой список запрещён.
    - name: cardinality
      type: enum
      values:
        - one
        - many
      required: true
      description: 'Допустимое число целей связи у одного узла-источника: ровно одна (one) или ноль и более (many).'
    - name: required
      type: bool
      required: true
      description: 'Обязательно ли заполнить связь хотя бы одной целью при создании узла. Для cardinality=one и required=true — ровно одна цель; для cardinality=many и required=true — не менее одной.'
    - name: description
      type: text
      required: false
      description: Назначение связи.
