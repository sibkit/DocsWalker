meta_schema_version: 3
name: DocsWalker Meta-Schema
description: Описывает форму schema-файла проекта (например, docs/Схема.yml). Schema-файл задаёт типы узлов, оси (отношения между узлами) и формы значений документов проекта.
primitive_types:
  - string
  - text
  - identifier
  - bool
  - integer
  - enum
  - list
type_kinds:
  - mapping
  - single_key_mapping
  - list
  - primitive
schema_root:
  kind: mapping
  description: Корневой объект schema-файла.
  fields:
    - name: description
      type: string
      required: true
      description: Однострочное описание схемы.
    - name: axes
      type: list
      of: axis_definition
      required: false
      description: Список объявленных в проекте осей — направленных именованных отношений между узлами.
    - name: types
      type: list
      of: type_definition
      required: true
      description: Список определений типов проекта.
  constraints:
    - Дополнительные ключи на корневом уровне не допускаются.
    - Имена типов уникальны в пределах schema-файла.
    - Имена осей уникальны в пределах schema-файла.
    - Имя оси не совпадает с именем поля любого type_definition (избежать коллизии при разборе CLI-параметров и ключей out_refs).
    - Идентификация schema-файла — по имени файла (см. Правила оформления/Идентификация документа); внутреннего поля schema/document не объявляется.
axis_definition:
  kind: mapping
  description: Описание одной оси — направленного именованного отношения между узлами.
  fields:
    - name: name
      type: string
      required: true
      description: Имя оси. Используется как ключ в API (параметр create-node, axis в get-refs, имя ключа в out_refs для kind=explicit).
    - name: direction
      type: enum
      values:
        - child_to_parent
        - parent_to_child
        - from_to
      required: true
      description: Направление оси.
    - name: kind
      type: enum
      values:
        - system
        - default
        - explicit
      required: true
      description: 'Способ хранения значений оси. system — управляется ядром, в YAML не хранится; default — порождается принадлежностью узла child-block родителя, имя оси совпадает с именем блока в типе родителя; explicit — пишется в out_refs узла-источника как single_key_mapping {имя_оси: id_цели}.'
    - name: cardinality
      type: enum
      values:
        - one
        - many
      required: true
      description: Сколько значений может иметь ось у одного узла. one — ровно одно значение (например, path); many — список значений (например, ref).
    - name: target_types
      type: list
      of: string
      required: false
      description: Список имён типов, допустимых на конце оси. Если не задано — допустим любой node-тип.
    - name: description
      type: text
      required: false
      description: Назначение оси.
  constraints:
    - Для kind=system значение оси создаётся и удаляется только ядром DocsWalker как побочный эффект структурных операций; через create_ref / delete_ref не управляется.
    - Для kind=default имя оси совпадает с именем блока (block) в типе родителя; принадлежность узла блоку родителя порождает значение оси автоматически.
    - Для kind=explicit имя оси не совпадает ни с одним именем default-блока ни одного type_definition.
type_definition:
  kind: mapping
  description: Описание одного типа.
  fields:
    - name: name
      type: string
      required: true
      description: Имя типа.
    - name: kind
      type: enum
      values:
        - mapping
        - single_key_mapping
        - list
        - primitive
      required: true
      description: Категория типа.
    - name: description
      type: text
      required: false
      description: Назначение типа.
    - name: node
      type: bool
      required: false
      description: 'Если true — экземпляр типа адресуется DocsWalker как узел и получает уникальный sequence-id. Допустим только при kind в {mapping, single_key_mapping}.'
    - name: title_source
      type: enum
      values:
        - filename
        - dirname
        - inline_key
        - field
      required: false
      description: 'Откуда узел берёт title: имя файла без расширения (filename), имя директории (dirname), ключ single_key_mapping (inline_key) или значение указанного поля (field). Задаётся только при node=true.'
    - name: title_field
      type: string
      required: false
      description: Имя поля, дающего title — задаётся только при title_source=field.
    - name: title_format
      type: string
      required: false
      description: 'Шаблон title узла в YAML с подстановками {id} и {title}. Задаётся только при title_source=inline_key. Пример: "(#{id}) {title}".'
    - name: fields
      type: list
      of: field_definition
      required: false
      description: Список полей. Используется только при kind=mapping. Пустой список допустим — узел без YAML-тела (например, тип folder).
    - name: key_type
      type: string
      required: false
      description: Тип ключа. Используется только при kind=single_key_mapping.
    - name: value_type
      type: string
      required: false
      description: Тип значения. Используется только при kind=single_key_mapping.
    - name: of
      type: string
      required: false
      description: Тип элемента списка. Используется только при kind=list (когда элементы однотипны).
    - name: blocks
      type: list
      of: block_definition
      required: false
      description: Список допустимых блоков. Используется при kind=list или у узла-single_key_mapping, значение которого — список блоков.
    - name: must_have_axes
      type: list
      of: string
      required: false
      description: Имена осей, обязательных для каждого экземпляра типа. Значение каждой такой оси должно быть задано при создании узла; ядро проверяет наличие при валидации.
    - name: may_have_axes
      type: list
      of: string
      required: false
      description: Имена осей, допустимых для типа дополнительно к must_have_axes. Значения этих осей не обязательны, но если заданы — должны соответствовать контракту оси.
    - name: constraints
      type: list
      of: string
      required: false
      description: Дополнительные правила для типа в человекочитаемой форме.
  constraints:
    - Поле fields допустимо только при kind=mapping.
    - Поле key_type обязательно и допустимо только при kind=single_key_mapping.
    - 'Поле value_type допустимо только при kind=single_key_mapping. У single_key_mapping значение задаётся либо value_type (скалярное значение), либо blocks (список блоков), но не оба сразу; одно из двух обязательно.'
    - 'При kind=list задаётся либо of (однотипный список), либо blocks (список блоков), но не оба сразу.'
    - 'При kind=primitive поля fields, key_type, value_type, of, blocks, node, title_*, must_have_axes, may_have_axes не задаются.'
    - node=true допустим только при kind=mapping или kind=single_key_mapping.
    - title_source обязательно при node=true.
    - title_format задаётся только при title_source=inline_key.
    - title_field задаётся только при title_source=field.
    - 'Имена в must_have_axes и may_have_axes должны быть объявлены в секции axes schema-файла; пересечение списков пусто.'
field_definition:
  kind: mapping
  description: Описание одного поля типа kind=mapping.
  fields:
    - name: name
      type: string
      required: true
      description: Имя поля (snake_case).
    - name: type
      type: string
      required: true
      description: Имя типа из schema-файла или примитива.
    - name: of
      type: string
      required: false
      description: Тип элемента — указывается только при type=list.
    - name: values
      type: list
      of: string
      required: false
      description: Перечень допустимых значений — указывается только при type=enum.
    - name: required
      type: bool
      required: true
      description: Обязательность поля.
    - name: default
      type: text
      required: false
      description: Значение по умолчанию.
    - name: description
      type: text
      required: false
      description: Назначение поля.
  constraints:
    - Поле default допустимо только при required=false.
    - Поле of обязательно при type=list.
    - Поле values обязательно при type=enum.
block_definition:
  kind: mapping
  description: Описание допустимого блока внутри kind=list со смешанными элементами (например, блока section_body). Блок может быть либо контейнером значений explicit-осей (см. role=refs_container), либо носителем default-оси одноимённой формы (см. role=default_axis).
  fields:
    - name: name
      type: string
      required: true
      description: Имя блока (snake_case). Для role=default_axis совпадает с именем default-оси, порождаемой принадлежностью узла блоку.
    - name: of
      type: string
      required: true
      description: Тип элементов блока.
    - name: required
      type: bool
      required: true
      description: Обязательность блока.
    - name: role
      type: enum
      values:
        - default_axis
        - refs_container
      required: false
      default: default_axis
      description: 'Назначение блока. default_axis — содержит дочерние узлы; принадлежность ребёнка блоку порождает значение default-оси с именем блока (parent_to_child). refs_container — содержит сериализацию значений explicit-осей (например, блок out_refs); сами по себе значения relations, имя блока не является именем оси.'
    - name: description
      type: text
      required: false
      description: Назначение блока.
  constraints:
    - В одном носителе не может быть двух блоков с одинаковым name.
    - 'При role=default_axis имя блока должно быть объявлено в секции axes schema-файла как ось с kind=default и direction=parent_to_child; элементы блока должны быть допустимы по target_types этой оси.'
    - 'При role=refs_container of должно ссылаться на тип kind=single_key_mapping, описывающий сериализацию одной ссылки (ключ — имя explicit-оси, значение — id цели).'
