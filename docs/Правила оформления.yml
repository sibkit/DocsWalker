id: 46
text: Стилевые и организационные правила оформления YAML-документов docs/.
sections:
  - "(#47) Назначение":
    - statements:
      - "(#96) Сфера правил": Документ задаёт стилевые и организационные правила оформления всех YAML-файлов в docs/.
  - "(#48) Идентификация документа":
    - statements:
      - "(#97) Идентификатор по пути": Идентификатором документа в путях ссылок служит путь файла относительно корня docs/, без расширения.
    - examples:
      - "(#49) Соответствие пути файла идентификатору": 'docs/Архитектура.yml → Архитектура; docs/lang/Синтаксис.yml → lang/Синтаксис'
    - rules:
      - "(#98) Уникальность через FS": Уникальность идентификатора обеспечивается файловой системой (нельзя положить два файла с одинаковым путём).
      - "(#99) Без поля document": Поле document или schema внутри YAML-файла не используется и не объявляется. Имя файла — единственный источник правды.
  - "(#50) Расширение файлов":
    - rules:
      - "(#100) Расширение .yml": Все файлы в docs/ имеют расширение ".yml" (не ".yaml").
  - "(#51) Язык ключей":
    - rules:
      - "(#101) Структурные snake_case": Структурные ключи (поля документа, блоки section, поля type_definition в Схеме и поля schema_root / type_definition / ref_def в мета-схеме) — на латинице, в нижнем регистре, snake_case.
      - "(#102) Доменные ключи": Доменные ключи (заголовок section, термин в элементе definitions, подпись в элементе examples, title смыслового атома) — человекочитаемые строки на русском или латинице.
      - "(#103) Без кириллицы в структурных": Кириллица и заглавные буквы в структурных ключах запрещены.
  - "(#52) Пустые строки":
    - rules:
      - "(#104) Без пустых строк": Пустые строки в YAML-файлах docs/ не допускаются.
  - "(#53) Идентификация узлов":
    - statements:
      - "(#105) id и title раздельно": 'У каждого узла есть глобально уникальный целочисленный id, выдаваемый DocsWalker. Title — короткая (1–2 слова) человекочитаемая часть. У смысловых узлов id и title в YAML склеиваются в ключ вида "(#id) title".'
    - examples:
      - "(#54) Section в YAML": 'ключ "(#42) Биекция текст ↔ граф" — id=42, title="Биекция текст ↔ граф".'
      - "(#55) Document": 'id хранится отдельным полем id в корне файла; title узла — имя файла без расширения.'
    - rules:
      - "(#106) id из sequence": id выдаёт DocsWalker из sequence-счётчика, хранящегося в docs/.docswalker/sequence.txt. Ручная правка id запрещена.
      - "(#107) Title уникален среди siblings": Title уникален среди узлов одного типа, разделяющих общего path-родителя. Например, два section в одном document не могут иметь одинаковый title; два statement в одной section — тоже.
      - "(#108) id уникален в docs": id уникален в пределах docs/.
  - "(#57) Порядок полей mapping-узлов":
    - rules:
      - "(#109) id первым": У документа поле id ставится первым ключом в mapping-корне YAML-файла. Это позволяет потоковому YAML-парсеру DocsWalker читать id раньше дочерних узлов и устанавливать связь parent → child без буферизации содержимого.
  - "(#60) Текстовые значения":
    - rules:
      - "(#110) Одна строка": Все текстовые значения помещаются на одной YAML-строке.
      - "(#111) Без литералов | и >": Многострочные блоки литерала ("|", ">") в docs/ не используются.
  - "(#61) Язык и стиль":
    - rules:
      - "(#112) Тексты на русском": Тексты в docs/ — на русском.
      - "(#113) Имена файлов на русском": Имена файлов — на русском, с пробелами, с расширением ".yml". Имя файла без расширения служит идентификатором документа в путях ссылок.
      - "(#114) Латиница для имён собственных": Допускается латиница для имён собственных — имени продукта, утилиты или иного программного артефакта (например, DocsWalker.yml).
      - "(#115) Структурные ключи на латинице": Все структурные ключи — на латинице, в нижнем регистре, snake_case; см. Правила оформления/Язык ключей.
      - "(#116) Title на естественном языке": Title разделов и имена типов в Схеме — естественные человекочитаемые строки на русском или латинице, как удобнее для чтения.
      - "(#117) Доменные термины как в спецификации": 'Доменные термины ("subject", "predicate", "object", "Part of", "Next", "p", "n") пишутся как в спецификации, без перевода.'
  - "(#62) Служебная папка docs/.docswalker":
    - statements:
      - "(#118) Назначение служебной папки": Папка docs/.docswalker/ зарезервирована за служебными файлами DocsWalker (мета-схема, sequence.txt и др.).
    - rules:
      - "(#119) Свой формат служебных": Файлы в docs/.docswalker/ не подчиняются Схеме обычных документов docs/. У них собственный формат, заданный DocsWalker.
      - "(#120) Структурные правила не применяются": Структурные правила (стиль ключей, пустые строки, ссылки) к содержимому docs/.docswalker/ не применяются.
  - "(#63) Применение к самому документу":
    - rules:
      - "(#121) Документ обычный": Этот файл — обычный document по типу Схема/document и оформлен по описанным здесь правилам.
      - "(#122) Пересмотр всех при изменении": При изменении правил пересматривается оформление всех файлов docs/, включая Схему.
