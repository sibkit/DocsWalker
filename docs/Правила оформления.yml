id: 46
description: Стилевые и организационные правила оформления YAML-документов docs/.
content:
  - "(#47) Назначение":
    - statements:
      - Документ задаёт стилевые и организационные правила оформления всех YAML-файлов в docs/.
    - out_refs:
      - ref: 4
  - "(#48) Идентификация документа":
    - statements:
      - Идентификатором документа в путях ссылок служит путь файла относительно корня docs/, без расширения.
    - examples:
      - "(#49) Соответствие пути файла идентификатору": 'docs/Архитектура.yml → Архитектура; docs/lang/Синтаксис.yml → lang/Синтаксис'
    - rules:
      - Уникальность идентификатора обеспечивается файловой системой (нельзя положить два файла с одинаковым путём).
      - Поле document или schema внутри YAML-файла не используется и не объявляется. Имя файла — единственный источник правды.
  - "(#50) Расширение файлов":
    - rules:
      - Все файлы в docs/ имеют расширение ".yml" (не ".yaml").
  - "(#51) Язык ключей":
    - rules:
      - Структурные ключи (имена полей и блоков, определённые в Схеме — description, content, definitions, statements, rules, may_rules, examples, notes, fields, out_refs, llm, name, type, of, values, required, default, id) — на латинице, в нижнем регистре, snake_case.
      - Доменные ключи (заголовок section, термин в элементе definitions, подпись в элементе examples) — человекочитаемые строки на русском или латинице.
      - Кириллица и заглавные буквы в структурных ключах запрещены.
  - "(#52) Пустые строки":
    - rules:
      - Пустые строки в YAML-файлах docs/ не допускаются.
  - "(#53) Идентификация узлов":
    - statements:
      - 'У каждого узла есть глобально уникальный целочисленный id, выдаваемый DocsWalker. Title — человекочитаемая часть. id и title в YAML склеиваются по title_format типа узла.'
    - examples:
      - "(#54) Section в YAML": 'ключ "(#42) Биекция текст ↔ граф" — id=42, title="Биекция текст ↔ граф".'
      - "(#55) Document": 'id хранится отдельным полем id в корне файла; title узла — имя файла без расширения.'
      - "(#56) Field": 'title узла — значение поля name; id хранится отдельным полем id внутри узла.'
    - rules:
      - 'id выдаёт DocsWalker из sequence-счётчика, хранящегося в docs/.docswalker/sequence.txt. Ручная правка id запрещена.'
      - В одном document не может быть двух section с одинаковым title. Title уникален в пределах документа.
      - id уникален в пределах docs/.
  - "(#57) Порядок полей mapping-узлов":
    - rules:
      - 'У mapping-узлов с обязательным полем id (типы document, field) поле id ставится первым в mapping. Это позволяет потоковому YAML-парсеру DocsWalker читать id раньше дочерних узлов и устанавливать значение оси path у ребёнка без буферизации содержимого.'
  - "(#58) Перекрёстные ссылки":
    - statements:
      - 'Значение explicit-оси сериализуется в блоке out_refs узла-источника как single_key_mapping {имя_оси: id_узла-цели}. Имя оси — это axis с kind=explicit, объявленная в секции axes Схемы.'
    - examples:
      - "(#59) Минимальная ссылка": 'out_refs: [{ref: 42}] — значение explicit-оси "ref" на узел с id=42.'
    - rules:
      - Имя оси должно быть объявлено в секции axes Схемы как axis с kind=explicit. Введение новой explicit-оси делается операцией add_axis.
      - Целевой узел должен существовать.
      - 'Путь и человекочитаемые подсказки в YAML не хранятся: путь — производная иерархии, доступная только через API DocsWalker.'
    - out_refs:
      - ref: 7
  - "(#60) Текстовые значения":
    - rules:
      - Все текстовые значения помещаются на одной YAML-строке.
      - Многострочные блоки литерала ("|", ">") в docs/ не используются.
  - "(#61) Язык и стиль":
    - rules:
      - Тексты в docs/ — на русском.
      - Имена файлов — на русском, с пробелами, с расширением ".yml". Имя файла без расширения служит идентификатором документа в путях ссылок.
      - Допускается латиница для имён собственных — имени продукта, утилиты или иного программного артефакта (например, DocsWalker.yml).
      - Все структурные ключи — на латинице, в нижнем регистре, snake_case; см. Правила оформления/Язык ключей.
      - Title разделов и имена типов в Схеме — естественные человекочитаемые строки на русском или латинице, как удобнее для чтения.
      - 'Доменные термины ("subject", "predicate", "object", "Part of", "Next", "p", "n") пишутся как в спецификации, без перевода.'
  - "(#62) Служебная папка docs/.docswalker":
    - statements:
      - Папка docs/.docswalker/ зарезервирована за служебными файлами DocsWalker (мета-схема, sequence.txt и др.).
    - rules:
      - Файлы в docs/.docswalker/ не подчиняются Схеме обычных документов docs/. У них собственный формат, заданный DocsWalker.
      - Структурные правила (стиль ключей, пустые строки, ссылки) к содержимому docs/.docswalker/ не применяются.
    - out_refs:
      - ref: 4
  - "(#63) Применение к самому документу":
    - rules:
      - Этот файл — обычный document по типу Схема/document и оформлен по описанным здесь правилам.
      - При изменении правил пересматривается оформление всех файлов docs/, включая Схему.
