id: 46
text: Стилевые и организационные правила оформления YAML-документов docs/.
sections:
  - "(#47) Назначение":
    - statements:
      - "(#96) Сфера правил":
        - text: Документ задаёт стилевые и организационные правила оформления всех YAML-файлов в docs/.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
  - "(#48) Идентификация документа":
    - statements:
      - "(#97) Идентификатор по пути":
        - text: Идентификатором документа в путях ссылок служит путь файла относительно корня docs/, без расширения.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
    - rules:
      - "(#98) Уникальность через FS":
        - text: Уникальность идентификатора обеспечивается файловой системой (нельзя положить два файла с одинаковым путём).
        - examples: [236]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#99) Без поля document":
        - text: Поле document или schema внутри YAML-файла не используется и не объявляется. Имя файла — единственный источник правды.
        - examples: [237]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
    - examples:
      - "(#49) Соответствие пути файла идентификатору":
        - text: docs/Архитектура.yml → Архитектура; docs/lang/Синтаксис.yml → lang/Синтаксис
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#236) Невозможно":
        - text: Два файла docs/Архитектура.yml создать нельзя — FS не позволит.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#237) Запрет поля":
        - text: 'В YAML-файле нельзя написать document: МойДок; имя файла — единственный источник имени.'
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
  - "(#50) Расширение файлов":
    - rules:
      - "(#100) Расширение .yml":
        - text: Все файлы в docs/ имеют расширение ".yml" (не ".yaml").
        - examples: [238]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
    - examples:
      - "(#238) Файлы .yml":
        - text: docs/DocsWalker.yml — корректно; docs/DocsWalker.yaml — игнорируется загрузчиком.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
  - "(#51) Язык ключей":
    - rules:
      - "(#101) Структурные snake_case":
        - text: Структурные ключи (поля документа, блоки section, поля type_definition в Схеме и поля schema_root / type_definition / ref_def в мета-схеме) — на латинице, в нижнем регистре, snake_case.
        - examples: [239]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#102) Доменные ключи":
        - text: Доменные ключи (заголовок section, термин в элементе definitions, подпись в элементе examples, title смыслового атома) — человекочитаемые строки на русском или латинице.
        - examples: [240]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#103) Без кириллицы в структурных":
        - text: Кириллица и заглавные буквы в структурных ключах запрещены.
        - examples: [241]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
    - examples:
      - "(#239) Корректно":
        - text: 'out_refs, target_types, text_required — корректные структурные ключи. Запрещено: outRefs, Target_Types.'
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#240) Доменное vs структурное":
        - text: '"(#42) Биекция текст ↔ граф" — доменный ключ; path_targets — структурный.'
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#241) Кириллица в ключе":
        - text: Поле "типы:" в YAML отвергается — нужно types:.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
  - "(#52) Пустые строки":
    - rules:
      - "(#104) Без пустых строк":
        - text: Пустые строки в YAML-файлах docs/ не допускаются.
        - examples: [242]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
    - examples:
      - "(#242) Без зазора":
        - text: Между двумя записями списка не должно быть пустой строки; emitter их не вставляет.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
  - "(#53) Идентификация узлов":
    - statements:
      - "(#105) id и title раздельно":
        - text: У каждого узла есть глобально уникальный целочисленный id, выдаваемый DocsWalker. Title — короткая (1–2 слова) человекочитаемая часть. У смысловых узлов id и title в YAML склеиваются в ключ вида "(#id) title".
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
    - rules:
      - "(#106) id из sequence":
        - text: id выдаёт DocsWalker из sequence-счётчика, хранящегося в docs/.docswalker/sequence.txt. Ручная правка id запрещена.
        - examples: [243]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#107) Title уникален среди siblings":
        - text: Title уникален среди узлов одного типа, разделяющих общего path-родителя. Например, два section в одном document не могут иметь одинаковый title; два statement в одной section — тоже.
        - examples: [244]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#108) id уникален в docs":
        - text: id уникален в пределах docs/.
        - examples: [245]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
    - examples:
      - "(#54) Section в YAML":
        - text: ключ "(#42) Биекция текст ↔ граф" — id=42, title="Биекция текст ↔ граф".
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#55) Document":
        - text: id хранится отдельным полем id в корне файла; title узла — имя файла без расширения.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#243) Sequence-id":
        - text: Новый узел получает id=sequence.txt+1; ручная правка id отвергается.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#244) Запрет дубля":
        - text: Два rule с title="Атомарность" под одной section отвергаются с кодом duplicate_title.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#245) Глобально":
        - text: Узел id=42 — единственный во всех файлах docs/.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
  - "(#57) Порядок полей mapping-узлов":
    - rules:
      - "(#109) id первым":
        - text: У документа поле id ставится первым ключом в mapping-корне YAML-файла. Это позволяет потоковому YAML-парсеру DocsWalker читать id раньше дочерних узлов и устанавливать связь parent → child без буферизации содержимого.
        - examples: [246]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
    - examples:
      - "(#246) Document YAML":
        - text: 'id: 42; text: ...; sections: [...] — id обязательно первым ключом.'
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
  - "(#60) Текстовые значения":
    - rules:
      - "(#110) Одна строка":
        - text: Все текстовые значения помещаются на одной YAML-строке.
        - examples: [247]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#111) Без литералов | и >":
        - text: Многострочные блоки литерала ("|", ">") в docs/ не используются.
        - examples: [248]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
    - examples:
      - "(#247) Запрет переноса":
        - text: Текст с символом перевода строки отвергается с invalid_text.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#248) Что нельзя в YAML":
        - text: 'text: |\n  multi\n  line запрещено; используется одна строка.'
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
  - "(#61) Язык и стиль":
    - rules:
      - "(#112) Тексты на русском":
        - text: Тексты в docs/ — на русском.
        - examples: [249]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#113) Имена файлов на русском":
        - text: Имена файлов — на русском, с пробелами, с расширением ".yml". Имя файла без расширения служит идентификатором документа в путях ссылок.
        - examples: [250]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#114) Латиница для имён собственных":
        - text: Допускается латиница для имён собственных — имени продукта, утилиты или иного программного артефакта (например, DocsWalker.yml).
        - examples: [251]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#115) Структурные ключи на латинице":
        - text: Все структурные ключи — на латинице, в нижнем регистре, snake_case; см. Правила оформления/Язык ключей.
        - examples: [252]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#116) Title на естественном языке":
        - text: Title разделов и имена типов в Схеме — естественные человекочитаемые строки на русском или латинице, как удобнее для чтения.
        - examples: [253]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#117) Доменные термины как в спецификации":
        - text: Доменные термины ("subject", "predicate", "object", "Part of", "Next", "p", "n") пишутся как в спецификации, без перевода.
        - examples: [254]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
    - examples:
      - "(#249) Русский текст":
        - text: '"(#42) Биекция": Структура изоморфна графу. — текст на русском.'
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#250) Имена файлов":
        - text: Архитектура.yml, Правила оформления.yml — имена файлов на русском.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#251) DocsWalker.yml":
        - text: Имя продукта — латиница; остальное — русский.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#252) Латиница в ключах":
        - text: Ключ text_required — латиница; значение "Назначение" — русский.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#253) Title раздела":
        - text: '"Биекция текст ↔ граф" — естественный заголовок, не идентификатор.'
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#254) Без перевода терминов":
        - text: subject, predicate, object пишутся как в RDF-спецификации.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
  - "(#62) Служебная папка docs/.docswalker":
    - statements:
      - "(#118) Назначение служебной папки":
        - text: Папка docs/.docswalker/ зарезервирована за служебными файлами DocsWalker (мета-схема, sequence.txt и др.).
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
    - rules:
      - "(#119) Свой формат служебных":
        - text: Файлы в docs/.docswalker/ не подчиняются Схеме обычных документов docs/. У них собственный формат, заданный DocsWalker.
        - examples: [255]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#120) Структурные правила не применяются":
        - text: Структурные правила (стиль ключей, пустые строки, ссылки) к содержимому docs/.docswalker/ не применяются.
        - examples: [256]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
    - examples:
      - "(#255) sequence.txt":
        - text: Содержит просто целое число; не подчиняется Схеме обычных документов.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#256) folders.yml":
        - text: В folders.yml нет ограничений на пустые строки и стиль ключей docs/.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
  - "(#63) Применение к самому документу":
    - rules:
      - "(#121) Документ обычный":
        - text: Этот файл — обычный document по типу Схема/document и оформлен по описанным здесь правилам.
        - examples: [257]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#122) Пересмотр всех при изменении":
        - text: При изменении правил пересматривается оформление всех файлов docs/, включая Схему.
        - examples: [258]
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
    - examples:
      - "(#257) В Схеме":
        - text: У Правила оформления.yml тип document, как у других docs/.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
      - "(#258) Кейс":
        - text: Если меняется правило о snake_case, проверяются все *.yml в docs/.
        - subject: [425]
        - subsystem: [433]
        - audience: [436]
        - csharp_structure: [437]
